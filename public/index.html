<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE — Markedssentiment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #1D9E75;
      --red:        #E24B4A;
      --amber:      #BA7517;
      --purple:     #7F77DD;

      --green-bg:   #0F2A1A;
      --red-bg:     #2A0F0F;
      --amber-bg:   #2A1F0F;
      --purple-bg:  #1A0F2A;

      --header-bg:  #0A0A0A;
      --page-bg:    #0A0A0A;
      --surface:    #111111;
      --border:     #222222;

      --text:       #F0F0F0;
      --muted:      #888888;

      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .site-header { animation: fadeInUp 350ms ease both; }

    .report.animating .verdict-card  { animation: fadeInUp 350ms ease 100ms both; }
    .report.animating .keydata-row   { animation: fadeInUp 350ms ease 200ms both; }
    .report.animating .category-grid { animation: fadeInUp 350ms ease 300ms both; }
    .report.animating .btn-refresh   { animation: fadeInUp 350ms ease 380ms both; }
    .report.animating .disclaimer    { animation: fadeInUp 350ms ease 420ms both; }

    html, body {
      background: var(--page-bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: var(--header-bg);
      padding: 28px 0 24px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 26px;
      letter-spacing: 0.04em;
      color: #FFFFFF;
    }

    .header-meta {
      font-family: var(--mono);
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-top: 5px;
      text-transform: lowercase;
    }

    /* ── Main ── */
    main {
      padding: 32px 0 64px;
    }

    /* ── States ── */
    .state { display: none; }
    .state.active { display: block; }

    /* Idle */
    .idle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 0 48px;
      gap: 12px;
    }

    .idle-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Loading */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 0 48px;
      gap: 20px;
    }

    .loading-ring {
      width: 36px;
      height: 36px;
      border: 2px solid #333333;
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loading-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* Error */
    .error-wrap {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }

    .error-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
    }

    .error-msg {
      font-size: 14px;
      color: var(--text);
    }

    /* ── Report ── */
    .report { display: flex; flex-direction: column; gap: 16px; }

    /* Verdict card */
    .verdict-card {
      background: #0F1A14;
      border: 0.5px solid var(--border);
      border-left: 4px solid var(--green);
      border-radius: 12px;
      padding: 28px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }

    .verdict-col-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .verdict-section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .verdict-text {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 18px;
      color: var(--text);
      line-height: 1.35;
    }

    .verdict-col-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .score-number {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 52px;
      line-height: 1;
      transition: color 0.3s;
    }

    .score-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Keydata */
    .keydata-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keydata-chip {
      background: #1A1A1A;
      border: 0.5px solid #333333;
      border-radius: 999px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .chip-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .chip-value {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    /* Category grid */
    .category-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .category-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 150ms ease, border-color 150ms ease;
    }

    .category-card:hover {
      transform: scale(1.01);
      border-color: #444444;
    }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .category-name {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    .sentiment-badge {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .badge-bullish { background: var(--green-bg);  color: var(--green); }
    .badge-bearish { background: var(--red-bg);    color: var(--red); }
    .badge-mixed   { background: var(--purple-bg); color: var(--purple); }
    .badge-avvent  { background: var(--amber-bg);  color: var(--amber); }

    .category-summary {
      font-family: var(--sans);
      font-size: 13px;
      color: #AAAAAA;
      line-height: 1.6;
    }

    /* Buttons */
    .btn-refresh,
    .btn-fetch {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      background: #1A1A1A;
      border: 0.5px solid #333333;
      border-radius: 8px;
      padding: 14px 28px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-refresh:hover:not(:disabled),
    .btn-fetch:hover:not(:disabled) {
      background: #222222;
    }

    .btn-refresh:disabled,
    .btn-fetch:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-refresh { width: 100%; margin-top: 4px; }

    /* Disclaimer */
    .disclaimer {
      font-family: var(--sans);
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      margin-top: 4px;
    }

    /* Mobile */
    @media (max-width: 520px) {
      .verdict-card {
        grid-template-columns: 1fr;
      }
      .verdict-col-right {
        flex-direction: row;
        justify-content: flex-start;
        align-items: baseline;
        gap: 10px;
      }
      .score-number { font-size: 40px; }
      .category-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="logo">PULSE_</div>
      <div class="header-meta" id="headerMeta">markedssentiment</div>
    </div>
  </header>

  <main>
    <div class="container">

      <!-- Idle -->
      <div id="stateIdle" class="state active">
        <div class="idle-wrap">
          <span class="idle-label">Klar til analyse</span>
          <button class="btn-fetch" onclick="fetchSentiment()">Hent dagens rapport</button>
        </div>
      </div>

      <!-- Loading -->
      <div id="stateLoading" class="state">
        <div class="loading-wrap">
          <div class="loading-ring"></div>
          <div class="loading-text" id="loadingText">Søker etter markedsdata...</div>
        </div>
      </div>

      <!-- Error -->
      <div id="stateError" class="state">
        <div class="error-wrap">
          <span class="error-label">Feil</span>
          <p class="error-msg" id="errorMsg"></p>
          <button class="btn-fetch" onclick="fetchSentiment()">Prøv igjen</button>
        </div>
      </div>

      <!-- Report -->
      <div id="stateReport" class="state">
        <div class="report">

          <!-- 1. Verdict card -->
          <div class="verdict-card">
            <div class="verdict-col-left">
              <span class="verdict-section-label">Dagens konklusjon</span>
              <div class="verdict-text" id="verdictText"></div>
            </div>
            <div class="verdict-col-right">
              <div class="score-number" id="scoreNumber"></div>
              <div class="score-label">Sentiment</div>
            </div>
          </div>

          <!-- 2. Keydata chips -->
          <div class="keydata-row" id="keydataRow"></div>

          <!-- 3. Category grid -->
          <div class="category-grid" id="categoryGrid"></div>

          <!-- 4. Refresh -->
          <button class="btn-refresh" id="refreshBtn" onclick="fetchSentiment(true)">
            Hent ny rapport
          </button>

          <!-- 5. Disclaimer -->
          <p class="disclaimer">
            Generert av AI basert på offentlig tilgjengelig informasjon.<br>
            Ikke finansiell rådgivning. Gjør egne vurderinger før du handler.
          </p>

        </div>
      </div>

    </div>
  </main>

  <script>
    // ── State management ──
    const STATES = ['stateIdle', 'stateLoading', 'stateError', 'stateReport'];

    function showState(id) {
      STATES.forEach(s => {
        document.getElementById(s).classList.toggle('active', s === id);
      });
    }

    // ── Loading messages ──
    const LOADING_MSGS = [
      'Søker etter markedsdata...',
      'Leser S&P 500 og Nasdaq...',
      'Sjekker makroøkonomiske indikatorer...',
      'Analyserer sektorsentiment...',
      'Kompilerer rapport...'
    ];

    let loadingTimer;

    function startLoadingMessages() {
      let i = 0;
      const el = document.getElementById('loadingText');
      el.textContent = LOADING_MSGS[0];
      loadingTimer = setInterval(() => {
        i = (i + 1) % LOADING_MSGS.length;
        el.textContent = LOADING_MSGS[i];
      }, 3000);
    }

    function stopLoadingMessages() {
      clearInterval(loadingTimer);
    }

    // ── Header timestamp ──
    function updateHeaderMeta() {
      const now = new Date();
      const dato = now.toLocaleDateString('no-NO', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const tid  = now.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('headerMeta').textContent =
        `markedssentiment · ${dato} · ${tid}`;
    }

    // ── Score color ──
    function scoreColor(score) {
      if (score < 40) return getComputedStyle(document.documentElement).getPropertyValue('--red').trim();
      if (score > 60) return getComputedStyle(document.documentElement).getPropertyValue('--green').trim();
      return getComputedStyle(document.documentElement).getPropertyValue('--amber').trim();
    }

    // ── Badge class ──
    function badgeClass(sentiment) {
      switch (sentiment) {
        case 'Bullish': return 'badge-bullish';
        case 'Bearish': return 'badge-bearish';
        case 'Mixed':   return 'badge-mixed';
        case 'Avvent':  return 'badge-avvent';
        default:        return 'badge-avvent';
      }
    }

    // ── Escape HTML ──
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Render report ──
    function renderReport(data) {
      updateHeaderMeta();

      // Verdict
      document.getElementById('verdictText').textContent = data.verdict || '–';

      // Score
      const score = typeof data.score === 'number' ? Math.round(data.score) : 50;
      const scoreEl = document.getElementById('scoreNumber');
      scoreEl.style.color = scoreColor(score);
      animateScore(scoreEl, score);

      // Keydata chips
      const keydataRow = document.getElementById('keydataRow');
      keydataRow.innerHTML = '';
      (data.keydata || []).forEach(item => {
        const chip = document.createElement('div');
        chip.className = 'keydata-chip';
        chip.innerHTML = `
          <span class="chip-label">${esc(item.label)}</span>
          <span class="chip-value">${esc(item.value)}</span>`;
        keydataRow.appendChild(chip);
      });

      // Category grid
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = '';
      (data.categories || []).forEach(cat => {
        const card = document.createElement('div');
        card.className = 'category-card';
        card.innerHTML = `
          <div class="category-header">
            <span class="category-name">${esc(cat.name)}</span>
            <span class="sentiment-badge ${badgeClass(cat.sentiment)}">${esc(cat.sentiment)}</span>
          </div>
          <p class="category-summary">${esc(cat.summary)}</p>`;
        grid.appendChild(card);
      });

      // Trigger staggered fade-in
      const reportEl = document.querySelector('.report');
      reportEl.classList.remove('animating');
      void reportEl.offsetHeight; // force reflow
      reportEl.classList.add('animating');

      showState('stateReport');
    }

    // ── Score counter animation ──
    function animateScore(el, target) {
      const duration = 800;
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - (1 - progress) * (1 - progress); // ease-out quad
        el.textContent = Math.round(eased * target);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ── Cache ──
    const CACHE_KEY = 'pulse_cache';
    const todayStr = () => new Date().toISOString().split('T')[0];

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (cached.date === todayStr()) return cached.data;
      } catch (_) {}
      return null;
    }

    function saveCache(data) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ date: todayStr(), data }));
      } catch (_) {}
    }

    // ── Fetch ──
    async function fetchSentiment(forceRefresh = false) {
      const refreshBtn = document.getElementById('refreshBtn');
      if (refreshBtn) refreshBtn.disabled = true;

      // Force refresh: clear cache
      if (forceRefresh) {
        localStorage.removeItem(CACHE_KEY);
      } else {
        // Check cache before hitting API
        const cached = loadCache();
        if (cached) {
          renderReport(cached);
          if (refreshBtn) refreshBtn.disabled = false;
          return;
        }
      }

      showState('stateLoading');
      startLoadingMessages();

      try {
        const resp = await fetch('/api/sentiment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await resp.json();

        if (!resp.ok || data.error) {
          showError(data.error || 'Ukjent feil. Prøv igjen.');
          return;
        }

        saveCache(data);
        renderReport(data);

      } catch (e) {
        showError('Nettverksfeil. Sjekk tilkoblingen og prøv igjen.');
      } finally {
        stopLoadingMessages();
        if (refreshBtn) refreshBtn.disabled = false;
      }
    }

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
      showState('stateError');
    }

    // Init: load from cache if available, else show idle
    updateHeaderMeta();
    const initCache = loadCache();
    if (initCache) renderReport(initCache);
  </script>

</body>
</html>
