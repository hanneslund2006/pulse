<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface-2: #181818;
      --border: #242424;
      --border-accent: #2a2a2a;
      --green: #1D9E75;
      --red: #E24B4A;
      --amber: #BA7517;
      --purple: #7F77DD;
      --text-primary: #F0F0F0;
      --text-secondary: #888888;
      --text-muted: #444444;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 56px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim {
      opacity: 0;
      animation: fadeUp 0.45s ease forwards;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 4px;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 30px;
      color: var(--green);
      letter-spacing: 0.14em;
    }

    .tagline {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* Gauge */
    .gauge-wrapper {
      margin: 32px 0 36px;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 520px;
    }

    .card {
      flex: 1;
      height: 220px;
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 180ms ease, border-color 180ms ease;
      user-select: none;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--border-accent);
    }

    .card:hover .arrow {
      transform: translateX(4px);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.02em;
      color: var(--text-primary);
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px;
      line-height: 1.55;
    }

    .arrow {
      position: absolute;
      bottom: 28px;
      right: 28px;
      font-size: 18px;
      color: var(--text-muted);
      transition: transform 180ms ease;
    }

    @media (max-width: 600px) {
      .cards {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="header anim" style="animation-delay: 0ms;">
    <div class="logo">PULSE</div>
    <div class="tagline">Daglig markedsorientering for swingtraders.</div>
  </div>

  <div class="gauge-wrapper anim" style="animation-delay: 80ms;">
    <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="80"
        fill="none" stroke="#242424" stroke-width="8"/>
      <circle id="gauge-arc"
        cx="100" cy="100" r="80"
        fill="none"
        stroke="#242424"
        stroke-width="8"
        stroke-linecap="round"
        stroke-dasharray="502.65"
        stroke-dashoffset="502.65"
        transform="rotate(-90 100 100)"/>
      <text id="gauge-score"
        x="100" y="98"
        font-family="'Space Mono', monospace"
        font-weight="700"
        font-size="48"
        fill="#444444"
        text-anchor="middle"
        dominant-baseline="middle">--</text>
      <text id="gauge-label"
        x="100" y="124"
        font-family="'Space Mono', monospace"
        font-size="10"
        fill="#444444"
        text-anchor="middle"
        letter-spacing="2">SENTIMENT</text>
    </svg>
  </div>

  <div class="cards">
    <div class="card anim" style="animation-delay: 160ms;" onclick="location.href='market.html'">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="38" width="5" height="6" rx="1" fill="#1D9E75" opacity="0.3"/>
        <rect x="13" y="28" width="5" height="16" rx="1" fill="#1D9E75" opacity="0.45"/>
        <rect x="22" y="32" width="5" height="12" rx="1" fill="#1D9E75" opacity="0.35"/>
        <rect x="31" y="18" width="5" height="26" rx="1" fill="#1D9E75" opacity="0.55"/>
        <polyline points="6.5,33 15.5,22 24.5,26 40,10"
          stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="40" cy="10" r="2.5" fill="#1D9E75"/>
      </svg>
      <div class="card-title">MARKED</div>
      <div class="card-desc">Daglig markedsoversikt med sentiment per sektor.</div>
      <div class="arrow">→</div>
    </div>

    <div class="card anim" style="animation-delay: 240ms;" onclick="location.href='ticker.html'">
      <svg class="card-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="21" cy="21" r="13" stroke="#1D9E75" stroke-width="2.5" fill="none"/>
        <path d="M31 31 L43 43" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M15 21 H27" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
        <path d="M21 15 V27" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="card-title">TICKER</div>
      <div class="card-desc">Dyp analyse av enkeltaksjer på fem lag.</div>
      <div class="arrow">→</div>
    </div>
  </div>

  <script>
    const CIRC = 502.65;

    function scoreColor(s) {
      if (s < 40) return '#E24B4A';
      if (s <= 60) return '#BA7517';
      return '#1D9E75';
    }

    function animateGauge(target) {
      const arc   = document.getElementById('gauge-arc');
      const score = document.getElementById('gauge-score');
      const col   = scoreColor(target);

      arc.setAttribute('stroke', col);
      score.setAttribute('fill', col);

      const targetOffset = CIRC * (1 - target / 100);
      const dur = 1200;
      const t0  = performance.now();

      function ease(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      (function tick(now) {
        const p = Math.min((now - t0) / dur, 1);
        const e = ease(p);
        arc.setAttribute('stroke-dashoffset', CIRC - e * (CIRC - targetOffset));
        score.textContent = Math.round(e * target);
        if (p < 1) {
          requestAnimationFrame(tick);
        } else {
          score.textContent = target;
        }
      })(t0);
    }

    // Read score from cache — same key as market.html
    const cacheKey = 'pulse_market_' + new Date().toISOString().slice(0, 10);
    try {
      const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
      if (cached && typeof cached.score === 'number') {
        setTimeout(() => animateGauge(cached.score), 400);
      }
    } catch (e) {}
  </script>
</body>
</html>
