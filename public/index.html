<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSE — Markedssentiment</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #1e1e1e;
      --green:     #00ff88;
      --red:       #ff3333;
      --neutral:   #666666;
      --dim:       #333333;
      --text:      #cccccc;
      --text-dim:  #555555;
      --accent:    #00ff88;
      --font:      'JetBrains Mono', 'Courier New', Courier, monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    .logo {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--green);
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }

    .logo span {
      color: var(--text-dim);
      font-weight: 400;
    }

    .tagline {
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── Button ── */
    .btn-fetch {
      display: block;
      width: 100%;
      padding: 18px 24px;
      margin: 32px 0;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-fetch:hover:not(:disabled) {
      background: rgba(0, 255, 136, 0.07);
      box-shadow: 0 0 24px rgba(0, 255, 136, 0.15);
    }

    .btn-fetch:disabled {
      border-color: var(--dim);
      color: var(--dim);
      cursor: not-allowed;
    }

    /* ── Loading ── */
    .loading {
      display: none;
      margin: 24px 0;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .loading.visible { display: block; }

    .loading-bar {
      height: 2px;
      background: var(--border);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .loading-bar::after {
      content: '';
      display: block;
      height: 100%;
      width: 30%;
      background: var(--green);
      animation: scan 1.4s ease-in-out infinite;
    }

    @keyframes scan {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .loading-text::before { content: '> '; color: var(--green); }

    /* ── Error ── */
    .error-box {
      display: none;
      padding: 14px 16px;
      border: 1px solid var(--red);
      color: var(--red);
      font-size: 12px;
      margin: 16px 0;
    }

    .error-box.visible { display: block; }
    .error-box::before { content: '[ERR] '; }

    /* ── Result ── */
    .result {
      display: none;
      margin-top: 16px;
    }

    .result.visible { display: block; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .result-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .result-timestamp {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ── Sentiment rows ── */
    .sentiment-rows { margin-bottom: 24px; }

    .row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .row:last-child { border-bottom: none; }

    .row-label {
      width: 72px;
      flex-shrink: 0;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .row-signal {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 2px 7px;
      flex-shrink: 0;
    }

    .signal-bullish  { color: var(--bg); background: var(--green); }
    .signal-bearish  { color: var(--bg); background: var(--red); }
    .signal-neutral  { color: var(--neutral); border: 1px solid var(--dim); padding: 1px 6px; }
    .signal-blandet  { color: #f0a500; border: 1px solid #f0a500; padding: 1px 6px; }

    .row-text {
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
    }

    /* ── Summary block ── */
    .summary-block {
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 16px;
    }

    .summary-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .summary-signal {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .summary-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Swing obs ── */
    .swing-block {
      border-left: 2px solid var(--accent);
      padding: 12px 16px;
      margin-bottom: 8px;
    }

    .swing-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 6px;
    }

    .swing-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Raw fallback ── */
    .raw-output {
      font-size: 12px;
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.7;
    }

    /* ── Footer ── */
    footer {
      margin-top: 56px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .container { padding: 32px 16px 64px; }
      .logo { font-size: 28px; }
      .row { flex-wrap: wrap; }
      .row-label { width: 100%; margin-bottom: 2px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="logo">PULSE<span>_</span></div>
      <div class="tagline">Markedsstemning. Uten støy.</div>
    </header>

    <main>
      <button class="btn-fetch" id="fetchBtn" onclick="fetchSentiment()">
        &gt; Hent dagens sentiment
      </button>

      <div class="loading" id="loading">
        <div class="loading-bar"></div>
        <div class="loading-text" id="loadingText">Søker etter ferske markedsnyheter...</div>
      </div>

      <div class="error-box" id="errorBox"></div>

      <div class="result" id="result">
        <div class="result-header">
          <span class="result-label">Markedsrapport</span>
          <span class="result-timestamp" id="timestamp"></span>
        </div>
        <div id="resultContent"></div>
      </div>
    </main>

    <footer>
      Powered by AI &mdash; Ikke finansiell rådgivning.
    </footer>
  </div>

  <script>
    // ── Loading messages ──
    const LOADING_MESSAGES = [
      'Søker etter ferske markedsnyheter...',
      'Analyserer S&P 500 og Nasdaq...',
      'Sjekker Fed-nyheter og makrodata...',
      'Leser Yahoo Finance og Finviz...',
      'Kompilerer sentimentrapport...'
    ];

    let loadingInterval;

    function startLoading() {
      const btn  = document.getElementById('fetchBtn');
      const load = document.getElementById('loading');
      const txt  = document.getElementById('loadingText');
      const err  = document.getElementById('errorBox');
      const res  = document.getElementById('result');

      btn.disabled = true;
      err.classList.remove('visible');
      res.classList.remove('visible');
      load.classList.add('visible');

      let i = 0;
      txt.textContent = LOADING_MESSAGES[0];
      loadingInterval = setInterval(() => {
        i = (i + 1) % LOADING_MESSAGES.length;
        txt.textContent = LOADING_MESSAGES[i];
      }, 2800);
    }

    function stopLoading() {
      clearInterval(loadingInterval);
      document.getElementById('loading').classList.remove('visible');
      document.getElementById('fetchBtn').disabled = false;
    }

    // ── Main fetch ──
    async function fetchSentiment() {
      startLoading();

      try {
        const resp = await fetch('/api/sentiment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await resp.json();

        if (!resp.ok || data.error) {
          showError(data.error || 'Ukjent feil. Prøv igjen.');
          return;
        }

        renderResult(data.sentiment);

      } catch (e) {
        showError('Nettverksfeil. Sjekk tilkoblingen og prøv igjen.');
      } finally {
        stopLoading();
      }
    }

    // ── Error display ──
    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.classList.add('visible');
    }

    // ── Result rendering ──
    function renderResult(text) {
      const container = document.getElementById('resultContent');
      const parsed    = parseReport(text);

      document.getElementById('timestamp').textContent = new Date().toLocaleString('no-NO', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      if (!parsed) {
        container.innerHTML = `<div class="raw-output">${escHtml(text)}</div>`;
      } else {
        container.innerHTML = buildHTML(parsed);
      }

      document.getElementById('result').classList.add('visible');
    }

    // ── Parser ──
    const SECTOR_KEYS = ['MAKRO', 'TECH', 'ENERGI', 'FINANS'];

    function parseReport(text) {
      const lines   = text.split('\n').map(l => l.trim()).filter(Boolean);
      const sectors = [];
      let samlet    = null;
      let swingObs  = null;

      for (const line of lines) {
        // Sector rows: MAKRO: BULLISH — ...
        for (const key of SECTOR_KEYS) {
          if (line.startsWith(key + ':')) {
            const rest   = line.slice(key.length + 1).trim();
            const signal = extractSignal(rest);
            const desc   = rest.replace(/^(BULLISH|BEARISH|NØYTRAL)\s*[—\-–]\s*/i, '').trim();
            sectors.push({ label: key, signal, desc });
            break;
          }
        }

        // SAMLET
        if (line.startsWith('SAMLET:')) {
          const rest   = line.slice('SAMLET:'.length).trim();
          const signal = extractSignal(rest);
          const desc   = rest.replace(/^(BULLISH|BEARISH|BLANDET)\s*[—\-–]\s*/i, '').trim();
          samlet = { signal, desc };
        }

        // SWING OBS
        if (line.startsWith('SWING OBS:')) {
          swingObs = line.slice('SWING OBS:'.length).trim();
        }
      }

      if (sectors.length === 0 && !samlet) return null;
      return { sectors, samlet, swingObs };
    }

    function extractSignal(text) {
      if (/BULLISH/i.test(text)) return 'BULLISH';
      if (/BEARISH/i.test(text)) return 'BEARISH';
      if (/BLANDET/i.test(text)) return 'BLANDET';
      if (/NØ?YTRAL/i.test(text)) return 'NØYTRAL';
      return 'NØYTRAL';
    }

    function signalClass(signal) {
      switch (signal) {
        case 'BULLISH': return 'signal-bullish';
        case 'BEARISH': return 'signal-bearish';
        case 'BLANDET': return 'signal-blandet';
        default:        return 'signal-neutral';
      }
    }

    function summaryColor(signal) {
      if (signal === 'BULLISH') return 'var(--green)';
      if (signal === 'BEARISH') return 'var(--red)';
      if (signal === 'BLANDET') return '#f0a500';
      return 'var(--neutral)';
    }

    // ── HTML builder ──
    function buildHTML({ sectors, samlet, swingObs }) {
      let html = '';

      if (sectors.length > 0) {
        html += '<div class="sentiment-rows">';
        for (const { label, signal, desc } of sectors) {
          html += `
            <div class="row">
              <span class="row-label">${escHtml(label)}</span>
              <span class="row-signal ${signalClass(signal)}">${escHtml(signal)}</span>
              <span class="row-text">${escHtml(desc)}</span>
            </div>`;
        }
        html += '</div>';
      }

      if (samlet) {
        html += `
          <div class="summary-block">
            <div class="summary-title">Samlet vurdering</div>
            <div class="summary-signal" style="color:${summaryColor(samlet.signal)}">${escHtml(samlet.signal)}</div>
            <div class="summary-text">${escHtml(samlet.desc)}</div>
          </div>`;
      }

      if (swingObs) {
        html += `
          <div class="swing-block">
            <div class="swing-title">Swing Obs</div>
            <div class="swing-text">${escHtml(swingObs)}</div>
          </div>`;
      }

      return html;
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
