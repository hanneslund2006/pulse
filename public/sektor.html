<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Sektorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 32px 20px 64px; }
    .container { max-width: 600px; margin: 0 auto; }

    @keyframes ls-pulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .ls-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: ls-pulse 1.2s ease-in-out infinite;
    }

    /* Sector list */
    .sector-list { display: none; flex-direction: column; gap: 8px; }
    .sector-list.visible { display: flex; }

    @keyframes fadeUp2 { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .sector-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px; display: flex; align-items: center; gap: 14px;
      transition: border-color 200ms ease, box-shadow 200ms ease;
      opacity: 0; animation: fadeUp2 0.35s ease forwards;
    }
    .sector-row:hover { border-color: rgba(29,184,126,0.28); box-shadow: 0 0 0 1px rgba(29,184,126,0.08), 0 0 16px rgba(29,184,126,0.05); }
    .sector-rank { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); width: 16px; flex-shrink: 0; text-align: right; }
    .sector-name { font-size: 14px; color: var(--text-primary); flex: 1; }
    .sector-symbol { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; flex-shrink: 0; }
    .sector-chg { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; flex-shrink: 0; min-width: 60px; text-align: right; }
    .sector-chg.up { color: var(--green); }
    .sector-chg.dn { color: var(--red); }
    .sector-bar-wrap { width: 60px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .sector-bar { height: 100%; border-radius: 2px; }
    .sector-bar.up { background: var(--green); }
    .sector-bar.dn { background: var(--red); }

    /* Klikk-inn panel */
    .sector-row { cursor: pointer; }
    .sector-row.active {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }
    .sector-panel {
      display: none;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
      padding: 14px 18px 14px 32px;
      margin-top: -4px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.65;
    }
    .sector-panel.visible { display: block; }
    .panel-loading {
      display: flex; align-items: center; gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; color: var(--text-muted); letter-spacing: 0.04em;
    }
    .panel-ticker {
      font-family: 'Space Mono', monospace; font-size: 9px;
      color: var(--green); letter-spacing: 0.12em; margin-bottom: 7px;
    }
    .panel-error { color: var(--red); font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">

    <a href="index.html" class="back anim" style="animation-delay:0ms;">← TILBAKE</a>

    <div class="page-title anim" style="animation-delay:40ms;">SEKTORER</div>
    <div class="page-subtitle anim" style="animation-delay:80ms;">Ukentlig styrke per sektor — sterkest til svakest.</div>

    <div id="empty-state" class="anim" style="animation-delay:120ms;">
      <div class="cta-card">
        <div class="cta-label">SEKTORANALYSE</div>
        <div class="cta-title">Hvilken sektor leder denne uken?</div>
        <div class="cta-desc">Henter ukentlig % endring for alle 11 SPDR-sektorer via Yahoo Finance. Cachet til neste dag.</div>
        <button class="btn-ghost" id="fetch-btn" onclick="fetchSectors()">HENT SEKTORDATA →</button>
      </div>
    </div>

    <div class="load-wrap" id="load-wrap">
      <div class="load-step">
        <div class="ls-dot"></div>
        <span>HENTER SEKTORDATA</span>
      </div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="sector-list" id="sector-list"></div>

    <div id="refresh-wrap" style="display:none; margin-top:14px;">
      <button class="btn" onclick="clearAndRefetch()">HENT NY DATA</button>
    </div>

    <div style="text-align:center;padding:32px 0 0;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-muted);letter-spacing:0.08em;">IKKE FINANSIELL RÅDGIVNING</div>
  </div>

  <script>
    const TODAY     = new Date().toISOString().slice(0, 10);
    const CACHE_KEY = 'pulse_sektor_' + TODAY;

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderSectors(data) {
      const list = document.getElementById('sector-list');
      const maxAbs = Math.max(...data.map(s => Math.abs(s.weeklyChange)), 0.01);

      list.innerHTML = data.map((s, i) => {
        const up   = s.weeklyChange >= 0;
        const cls  = up ? 'up' : 'dn';
        const sign = up ? '+' : '';
        const barW = Math.min(Math.abs(s.weeklyChange) / maxAbs * 100, 100);
        const color = up ? '#1D9E75' : '#E24B4A';
        return `<div class="sector-row" id="row-${esc(s.symbol)}"
          onclick="togglePanel('${esc(s.symbol)}','${esc(s.name)}')"
          style="border-color:${color}40;background:${color}08;animation-delay:${i * 50}ms;">
          <div class="sector-rank">${i + 1}</div>
          <div class="sector-name">${esc(s.name)}</div>
          <div class="sector-symbol">${esc(s.symbol)}</div>
          <div class="sector-bar-wrap"><div class="sector-bar ${cls}" style="width:${barW}%"></div></div>
          <div class="sector-chg ${cls}">${sign}${s.weeklyChange.toFixed(2)}%</div>
        </div>
        <div class="sector-panel" id="panel-${esc(s.symbol)}"></div>`;
      }).join('');

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('load-wrap').classList.remove('visible');
      list.classList.add('visible');
      document.getElementById('refresh-wrap').style.display = 'block';
    }

    let fetching = false;

    async function fetchSectors() {
      if (fetching) return;
      fetching = true;
      const btn = document.getElementById('fetch-btn');
      if (btn) btn.disabled = true;
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('load-wrap').classList.add('visible');

      try {
        const res = await fetch('/api/sektor');
        if (!res.ok) throw new Error('Serverfeil ' + res.status);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        renderSectors(data);
      } catch (e) {
        document.getElementById('load-wrap').classList.remove('visible');
        document.getElementById('empty-state').style.display = 'block';
        if (btn) btn.disabled = false;
        const errEl = document.getElementById('error-msg');
        errEl.textContent = e.message || 'Klarte ikke hente sektordata. Prøv igjen.';
        errEl.classList.add('visible');
      } finally {
        fetching = false;
      }
    }

    function clearAndRefetch() {
      localStorage.removeItem(CACHE_KEY);
      document.getElementById('sector-list').classList.remove('visible');
      document.getElementById('refresh-wrap').style.display = 'none';
      fetchSectors();
    }

    // ── Klikk-inn panel ───────────────────────────────────────
    let activePanel = null;

    function sektorCacheKey(symbol) {
      const hr = new Date().toISOString().slice(0, 13).replace('T', '-');
      return `sektor:${symbol}:${hr}`;
    }

    function togglePanel(symbol, name) {
      const panel = document.getElementById('panel-' + symbol);
      const row   = document.getElementById('row-'   + symbol);
      if (!panel || !row) return;

      if (activePanel === symbol) {
        panel.classList.remove('visible');
        row.classList.remove('active');
        activePanel = null;
        return;
      }

      if (activePanel) {
        const prevPanel = document.getElementById('panel-' + activePanel);
        const prevRow   = document.getElementById('row-'   + activePanel);
        if (prevPanel) prevPanel.classList.remove('visible');
        if (prevRow)   prevRow.classList.remove('active');
      }

      activePanel = symbol;
      row.classList.add('active');
      panel.classList.add('visible');

      const key = sektorCacheKey(symbol);
      try {
        const hit = localStorage.getItem(key);
        if (hit) { panel.innerHTML = JSON.parse(hit).html; return; }
      } catch (_) {}

      panel.innerHTML = `<div class="panel-loading"><div class="ls-dot"></div>ANALYSERER ${esc(symbol)}…</div>`;

      fetch(`/api/sektor?ticker=${encodeURIComponent(symbol)}&navn=${encodeURIComponent(name)}`)
        .then(r => r.json())
        .then(d => {
          if (d.error) throw new Error(d.error);
          const html = `<div class="panel-ticker">${esc(symbol)} — ${esc(name)}</div><div>${esc(d.analyse)}</div>`;
          panel.innerHTML = html;
          try { localStorage.setItem(key, JSON.stringify({ html })); } catch (_) {}
        })
        .catch(e => {
          panel.innerHTML = `<div class="panel-error">${esc(e.message || 'Klarte ikke hente analyse.')}</div>`;
        });
    }

    // Load from cache on init
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cached && Array.isArray(cached)) renderSectors(cached);
    } catch (_) {}
  </script>
  <script src="bg.js"></script>
  <script src="live.js"></script>
</body>
</html>
