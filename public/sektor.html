<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Sektorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface-2: #181818;
      --border: #242424;
      --border-accent: #2a2a2a;
      --green: #1D9E75;
      --red: #E24B4A;
      --amber: #BA7517;
      --purple: #7F77DD;
      --text-primary: #F0F0F0;
      --text-secondary: #888888;
      --text-muted: #444444;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 32px 20px 64px;
    }

    .container { max-width: 600px; margin: 0 auto; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim { opacity: 0; animation: fadeUp 0.45s ease forwards; }

    .back {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--text-muted); text-decoration: none;
      letter-spacing: 0.06em; margin-bottom: 36px;
      transition: color 180ms;
    }
    .back:hover { color: var(--text-secondary); }

    .page-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 28px; letter-spacing: 0.02em; margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px; color: var(--text-secondary); margin-bottom: 36px;
    }

    .section-title {
      font-family: 'Space Mono', monospace; font-size: 9px;
      letter-spacing: 0.18em; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 12px;
    }

    /* CTA card */
    .cta-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 14px; padding: 32px 28px;
    }
    .cta-label {
      font-family: 'Space Mono', monospace; font-size: 9px;
      color: var(--text-muted); letter-spacing: 0.16em; margin-bottom: 10px;
    }
    .cta-title {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 21px; margin-bottom: 8px;
    }
    .cta-desc {
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.65; margin-bottom: 22px;
    }
    .btn-primary {
      width: 100%; padding: 14px; background: var(--green);
      border: none; border-radius: 9px; color: #050e0a;
      font-family: 'Space Mono', monospace; font-size: 11px;
      font-weight: 700; letter-spacing: 0.14em;
      cursor: pointer; transition: opacity 160ms;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.82; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn {
      width: 100%; padding: 14px; background: transparent;
      border: 0.5px solid var(--border); border-radius: 10px;
      color: var(--text-secondary); font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 0.12em;
      cursor: pointer; transition: border-color 180ms, color 180ms;
    }
    .btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Loading */
    .load-wrap { display: none; padding: 48px 0 40px; }
    .load-wrap.visible { display: block; }
    .load-step {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Mono', monospace; font-size: 10px;
      letter-spacing: 0.1em; color: var(--green);
    }
    @keyframes ls-pulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .ls-dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
      animation: ls-pulse 1.2s ease-in-out infinite;
    }

    /* Sector list */
    .sector-list { display: none; flex-direction: column; gap: 8px; }
    .sector-list.visible { display: flex; }

    .sector-row {
      background: var(--surface); border: 0.5px solid var(--border);
      border-left: 4px solid var(--border); border-radius: 10px;
      padding: 14px 18px; display: flex; align-items: center; gap: 14px;
      transition: transform 180ms ease;
    }
    .sector-row:hover { transform: translateY(-2px); }

    .sector-rank {
      font-family: 'Space Mono', monospace; font-size: 9px;
      color: var(--text-muted); width: 16px; flex-shrink: 0;
      text-align: right;
    }

    .sector-name { font-size: 14px; color: var(--text-primary); flex: 1; }

    .sector-symbol {
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: var(--text-muted); letter-spacing: 0.06em; flex-shrink: 0;
    }

    .sector-chg {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: 13px; flex-shrink: 0; min-width: 60px; text-align: right;
    }
    .sector-chg.up { color: var(--green); }
    .sector-chg.dn { color: var(--red); }

    .sector-bar-wrap {
      width: 60px; height: 3px; background: var(--border);
      border-radius: 2px; overflow: hidden; flex-shrink: 0;
    }
    .sector-bar { height: 100%; border-radius: 2px; }
    .sector-bar.up { background: var(--green); }
    .sector-bar.dn { background: var(--red); }

    @keyframes fadeUp2 {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .sector-row { opacity: 0; animation: fadeUp2 0.35s ease forwards; }
  </style>
</head>
<body>
  <div class="container">

    <a href="index.html" class="back anim" style="animation-delay:0ms;">← TILBAKE</a>

    <div class="page-title anim" style="animation-delay:40ms;">SEKTORER</div>
    <div class="page-subtitle anim" style="animation-delay:80ms;">Ukentlig styrke per sektor — sterkest til svakest.</div>

    <div id="empty-state" class="anim" style="animation-delay:120ms;">
      <div class="cta-card">
        <div class="cta-label">SEKTORANALYSE</div>
        <div class="cta-title">Hvilken sektor leder denne uken?</div>
        <div class="cta-desc">Henter ukentlig % endring for alle 11 SPDR-sektorer via Yahoo Finance. Cachet til neste dag.</div>
        <button class="btn-primary" id="fetch-btn" onclick="fetchSectors()">HENT SEKTORDATA →</button>
      </div>
    </div>

    <div class="load-wrap" id="load-wrap">
      <div class="load-step">
        <div class="ls-dot"></div>
        <span>HENTER SEKTORDATA</span>
      </div>
    </div>

    <div class="sector-list" id="sector-list"></div>

    <div id="refresh-wrap" style="display:none; margin-top:14px;">
      <button class="btn" onclick="clearAndRefetch()">HENT NY DATA</button>
    </div>

  </div>

  <script>
    const TODAY     = new Date().toISOString().slice(0, 10);
    const CACHE_KEY = 'pulse_sektor_' + TODAY;

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderSectors(data) {
      const list = document.getElementById('sector-list');
      const maxAbs = Math.max(...data.map(s => Math.abs(s.weeklyChange)), 0.01);

      list.innerHTML = data.map((s, i) => {
        const up   = s.weeklyChange >= 0;
        const cls  = up ? 'up' : 'dn';
        const sign = up ? '+' : '';
        const barW = Math.min(Math.abs(s.weeklyChange) / maxAbs * 100, 100);
        const color = up ? '#1D9E75' : '#E24B4A';
        return `<div class="sector-row" style="border-left-color:${color}; animation-delay:${i * 50}ms;">
          <div class="sector-rank">${i + 1}</div>
          <div class="sector-name">${esc(s.name)}</div>
          <div class="sector-symbol">${esc(s.symbol)}</div>
          <div class="sector-bar-wrap"><div class="sector-bar ${cls}" style="width:${barW}%"></div></div>
          <div class="sector-chg ${cls}">${sign}${s.weeklyChange.toFixed(2)}%</div>
        </div>`;
      }).join('');

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('load-wrap').classList.remove('visible');
      list.classList.add('visible');
      document.getElementById('refresh-wrap').style.display = 'block';
    }

    let fetching = false;

    async function fetchSectors() {
      if (fetching) return;
      fetching = true;
      const btn = document.getElementById('fetch-btn');
      if (btn) btn.disabled = true;
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('load-wrap').classList.add('visible');

      try {
        const res = await fetch('/api/sektor');
        if (!res.ok) throw new Error('Serverfeil ' + res.status);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        renderSectors(data);
      } catch (e) {
        document.getElementById('load-wrap').classList.remove('visible');
        document.getElementById('empty-state').style.display = 'block';
        if (btn) btn.disabled = false;
        alert('Feil: ' + e.message);
      } finally {
        fetching = false;
      }
    }

    function clearAndRefetch() {
      localStorage.removeItem(CACHE_KEY);
      document.getElementById('sector-list').classList.remove('visible');
      document.getElementById('refresh-wrap').style.display = 'none';
      fetchSectors();
    }

    // Load from cache on init
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cached && Array.isArray(cached)) renderSectors(cached);
    } catch (_) {}
  </script>
  <script src="bg.js"></script>
  <script src="live.js"></script>
</body>
</html>
