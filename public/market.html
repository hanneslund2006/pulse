<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Marked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 32px 20px 64px; }

    .container { max-width: 600px; margin: 0 auto; }

    /* Data sections */
    .data-sections { display: none; }
    .data-sections.visible { display: flex; flex-direction: column; gap: 14px; }

    /* Verdict card */
    .verdict-card {
      background: var(--surface);
      border: 1px solid var(--green-border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
    }
    .verdict-left { flex: 1; min-width: 0; }
    .verdict-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px; color: var(--text-muted);
      letter-spacing: 0.15em; margin-bottom: 8px;
    }
    .verdict-text { font-size: 15px; line-height: 1.45; color: var(--text-primary); }
    .verdict-right { flex-shrink: 0; text-align: right; }
    .verdict-score {
      font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 52px;
      color: var(--green); line-height: 1;
    }
    .verdict-score-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px; color: var(--text-muted);
      letter-spacing: 0.1em; margin-top: 4px;
    }

    /* Keydata chips */
    .keydata { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
      flex: 1; min-width: 120px;
    }
    .chip-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-muted);
      letter-spacing: 0.12em; margin-bottom: 5px;
    }
    .chip-value {
      font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700;
      color: var(--text-data);
    }
    .chip-value.up { color: var(--green); }
    .chip-value.dn { color: var(--red); }
    .chip-sub {
      font-family: 'Space Mono', monospace;
      font-size: 8px; color: var(--text-muted);
      letter-spacing: 0.08em; margin-top: 3px;
    }

    /* Category grid */
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .cat-card:hover { border-color: rgba(29,184,126,0.30); box-shadow: 0 0 0 1px rgba(29,184,126,0.10), 0 0 20px rgba(29,184,126,0.06); }
    .cat-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .cat-name {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 11px; letter-spacing: 0.08em;
    }
    .cat-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }

    /* Regime banner */
    .regime-banner {
      background: var(--surface);
      border: 1px solid var(--green-border);
      border-radius: 12px; padding: 14px 24px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
    }
    .regime-left { display: flex; flex-direction: column; gap: 3px; }
    .regime-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 9px; color: var(--text-muted); letter-spacing: 0.15em;
    }
    .regime-value {
      font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 14px; letter-spacing: 0.12em;
    }
    .regime-vix {
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-muted); letter-spacing: 0.08em;
    }

    /* Earnings calendar */
    .earnings-section { display: flex; flex-direction: column; gap: 8px; }
    .earnings-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .earnings-ticker {
      font-family: 'Space Mono', monospace;
      font-size: 10px; color: var(--green);
      border: 1px solid var(--green-border);
      background: var(--green-dim);
      border-radius: 4px; padding: 3px 8px;
      letter-spacing: 0.08em; flex-shrink: 0;
      min-width: 54px; text-align: center;
    }
    .earnings-company {
      font-size: 13px; color: var(--text-primary);
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .earnings-date {
      font-family: 'Space Mono', monospace;
      font-size: 10px; color: var(--text-secondary); flex-shrink: 0;
    }
    .earnings-badge {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 0.08em;
      padding: 3px 6px; border-radius: 3px; flex-shrink: 0;
    }
    .earnings-badge.pre  { color: var(--amber);      background: rgba(196,130,26,0.12); }
    .earnings-badge.post { color: var(--purple);     background: rgba(139,131,232,0.12); }
    .earnings-badge.past { color: var(--text-muted); background: rgba(74,81,102,0.10); }
    .earnings-empty { font-size: 12px; color: var(--text-muted); padding: 4px 0; }

    /* Gappers */
    .gappers-section { display: flex; flex-direction: column; gap: 8px; }
    .gapper-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .gapper-ticker {
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.08em;
      min-width: 54px; border-radius: 4px;
      padding: 3px 8px; text-align: center; flex-shrink: 0;
    }
    .gapper-ticker.up { color: var(--green); border: 1px solid var(--green-border); background: var(--green-dim); }
    .gapper-ticker.dn { color: var(--red);   border: 1px solid rgba(229,75,74,0.3);  background: rgba(229,75,74,0.06); }
    .gapper-company {
      font-size: 13px; color: var(--text-primary);
      flex: 1; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .gapper-gap { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .gapper-gap.up { color: var(--green); }
    .gapper-gap.dn { color: var(--red); }
    .gapper-vol {
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-muted);
      letter-spacing: 0.06em; flex-shrink: 0;
    }
    .gappers-closed {
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-muted); letter-spacing: 0.08em; padding: 4px 0;
    }
    .gapper-sma {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 0.08em;
      padding: 3px 6px; border-radius: 3px; flex-shrink: 0;
    }
    .gapper-sma.above { color: var(--green); background: var(--green-dim); }
    .gapper-sma.below { color: var(--red); background: rgba(229,75,74,0.08); }

    /* Macro calendar */
    .macro-section { display: flex; flex-direction: column; gap: 8px; }
    .macro-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .macro-name { font-size: 13px; color: var(--text-primary); flex: 1; }
    .macro-date { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-secondary); flex-shrink: 0; }
    .macro-badge {
      font-family: 'Space Mono', monospace;
      font-size: 8px; letter-spacing: 0.08em;
      padding: 3px 7px; border-radius: 3px; flex-shrink: 0;
    }
    .macro-badge.today  { color: var(--red);   background: rgba(229,75,74,0.12); }
    .macro-badge.soon   { color: var(--amber);  background: rgba(196,130,26,0.12); }
    .macro-badge.future { color: var(--text-muted); background: transparent; }

    @media (max-width: 600px) {
      .cat-grid { grid-template-columns: 1fr; }
      .verdict-card { flex-direction: column; align-items: flex-start; }
      .verdict-right { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="container">

    <a href="index.html" class="back anim" style="animation-delay: 0ms;">← TILBAKE</a>

    <div class="page-title anim" style="animation-delay: 40ms;">MARKED</div>
    <div class="page-date anim" id="page-date" style="animation-delay: 80ms;">—</div>

    <!-- Always-visible live chips -->
    <div class="keydata anim" id="keydata" style="animation-delay: 110ms; margin-bottom: 20px;"></div>

    <!-- Empty state / CTA card -->
    <div class="empty-state anim" id="empty-state" style="animation-delay: 120ms;">
      <div class="cta-card">
        <div class="cta-label">DAGLIG MARKEDSANALYSE</div>
        <div class="cta-title">Hva skjer i markedet i dag?</div>
        <div class="cta-desc">AI-drevet sentimentoversikt med score, sektorbilde og earnings-kalender — på under ett minutt.</div>
        <button class="btn-ghost" id="fetch-btn" onclick="fetchReport()">ANALYSER MARKEDET →</button>
      </div>
    </div>

    <!-- Multi-step loading -->
    <div class="load-wrap" id="load-wrap">
      <div class="load-steps" id="load-steps"></div>
      <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
      <div class="load-elapsed" id="load-elapsed">0s</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <!-- Data sections -->
    <div class="data-sections" id="data-sections">

      <!-- Feature 1: Regime banner -->
      <div class="regime-banner" id="regime-banner" style="display:none;">
        <div class="regime-left">
          <div class="regime-label">MARKEDSREGIME</div>
          <div class="regime-value" id="regime-value">—</div>
        </div>
        <div class="regime-vix" id="regime-vix"></div>
      </div>

      <!-- Feature 6: Pre-market gappers -->
      <div id="gappers-wrap" style="display:none;">
        <div class="gappers-section" id="gappers-section"></div>
      </div>

      <div class="verdict-card" id="verdict-card">
        <div class="verdict-left">
          <div class="verdict-label">KONKLUSJON</div>
          <div class="verdict-text" id="verdict-text">—</div>
        </div>
        <div class="verdict-right">
          <div class="verdict-score" id="verdict-score">—</div>
          <div class="verdict-score-sub">/ 100</div>
        </div>
      </div>

      <div class="cat-grid" id="cat-grid"></div>

      <!-- Earnings calendar -->
      <div class="earnings-section" id="earnings-section" style="display:none;">
        <div class="section-title">EARNINGS DENNE UKEN</div>
        <div id="earnings-list"></div>
      </div>

      <!-- Feature 2: Macro calendar -->
      <div class="macro-section" id="macro-section" style="display:none;"></div>

      <button class="btn" id="refresh-btn" onclick="clearAndRefetch()">HENT NY RAPPORT</button>

    </div>

    <div style="text-align:center;padding:32px 0 0;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-muted);letter-spacing:0.08em;">IKKE FINANSIELL RÅDGIVNING</div>
  </div>

  <script>
    const TODAY     = new Date().toISOString().slice(0, 10);
    const CACHE_KEY = 'pulse_market_' + TODAY;

    const SENTIMENT_COLORS = {
      'Bullish': '#1D9E75', 'Bearish': '#E24B4A',
      'Mixed':   '#7F77DD', 'Avvent':  '#BA7517',
    };

    // ── Helpers ──────────────────────────────────────────────
    function scoreColor(s) {
      if (s < 40) return '#E24B4A';
      if (s <= 60) return '#BA7517';
      return '#1D9E75';
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function animateItems() {
      document.querySelectorAll('#data-sections > *').forEach((el, i) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(16px)';
        el.style.transition = 'none';
        requestAnimationFrame(() => {
          setTimeout(() => {
            el.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
          }, i * 80);
        });
      });
    }

    // ── Live price chips ─────────────────────────────────────
    const LIVE_SYMS   = ['^GSPC', '^NDX', '^VIX', '^TNX'];
    const LIVE_LABELS = { '^GSPC': 'S&P 500', '^NDX': 'NDX 100', '^VIX': 'VIX', '^TNX': '10-ÅRS' };
    let lastClaudeKeydata = null;

    function fmtChipPrice(p, sym) {
      if (sym === '^VIX' || sym === '^TNX') return p.toFixed(2);
      if (p >= 10000) return p.toLocaleString('en-US', { maximumFractionDigits: 0 });
      if (p >= 1000)  return p.toLocaleString('en-US', { maximumFractionDigits: 2 });
      return p.toFixed(2);
    }

    async function fetchAndInjectRealPrices() {
      try {
        let data = window.PULSE_QUOTES;
        if (!data) {
          const res = await fetch('/api/quotes?symbols=' + encodeURIComponent(LIVE_SYMS.join(',')));
          if (!res.ok) throw new Error();
          data = await res.json();
        }
        const map = {};
        (data || []).forEach(q => { map[q.symbol] = q; });

        const el = document.getElementById('keydata');
        if (!el) return;

        const html = LIVE_SYMS.map(sym => {
          const q = map[sym];
          if (!q) return '';
          const up = q.changePercent > 0, dn = q.changePercent < 0;
          const cls = sym === '^VIX' ? '' : (up ? 'up' : dn ? 'dn' : '');
          const sign = up ? '+' : '';
          return `<div class="chip">
            <div class="chip-label">${LIVE_LABELS[sym] || sym}</div>
            <div class="chip-value ${cls}">${fmtChipPrice(q.price, sym)}</div>
            <div class="chip-sub">${sign}${q.changePercent.toFixed(2)}% · LIVE</div>
          </div>`;
        }).filter(Boolean).join('');

        if (html) el.innerHTML = html;

        // Update regime banner from live VIX
        const vixQ = map['^VIX'];
        if (vixQ) {
          updateRegime(vixQ.price);
          // Persist VIX into today's cache so regime survives page reload
          try {
            const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
            if (cached) { cached.vix = vixQ.price; localStorage.setItem(CACHE_KEY, JSON.stringify(cached)); }
          } catch (_) {}
        }
      } catch (_) {
        // Fallback: show Claude's keydata if available
        if (lastClaudeKeydata && lastClaudeKeydata.length) {
          const el = document.getElementById('keydata');
          if (el && !el.querySelector('.chip-sub')) {
            el.innerHTML = lastClaudeKeydata.map(kd => `
              <div class="chip">
                <div class="chip-label">${esc(kd.label)}</div>
                <div class="chip-value">${esc(kd.value)}</div>
              </div>`).join('');
          }
        }
      }
    }

    // Hook: re-inject when live.js resolves quotes
    window.__onQuotesReady = () => fetchAndInjectRealPrices();

    // ── Multi-step loading ───────────────────────────────────
    const LOAD_STEPS = ['SØKER NYHETER', 'ANALYSERER SEKTORER', 'SCORER SENTIMENT', 'FORMATERER RAPPORT'];
    const loadState  = { stepTimer: null, elapsedTimer: null, startTime: 0, stepIdx: 0 };

    function startLoading() {
      loadState.stepIdx  = 0;
      loadState.startTime = Date.now();

      const stepsEl   = document.getElementById('load-steps');
      const barEl     = document.getElementById('load-bar');
      const elapsedEl = document.getElementById('load-elapsed');

      stepsEl.innerHTML = LOAD_STEPS.map((s, i) =>
        `<div class="load-step${i === 0 ? ' active' : ''}" id="ls-${i}">
          <div class="ls-dot"></div>${s}
        </div>`
      ).join('');

      barEl.style.transition = 'none';
      barEl.style.width = '0%';
      elapsedEl.textContent = '0s';

      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('load-wrap').classList.add('visible');

      requestAnimationFrame(() => {
        barEl.style.transition = 'width 20s linear';
        barEl.style.width = '88%';
      });

      loadState.stepTimer = setInterval(() => {
        const prev = document.getElementById('ls-' + loadState.stepIdx);
        if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
        loadState.stepIdx = Math.min(loadState.stepIdx + 1, LOAD_STEPS.length - 1);
        const cur = document.getElementById('ls-' + loadState.stepIdx);
        if (cur) cur.classList.add('active');
      }, 4500);

      loadState.elapsedTimer = setInterval(() => {
        elapsedEl.textContent = Math.floor((Date.now() - loadState.startTime) / 1000) + 's';
      }, 1000);
    }

    function stopLoading() {
      clearInterval(loadState.stepTimer);
      clearInterval(loadState.elapsedTimer);
      document.getElementById('load-wrap').classList.remove('visible');
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('visible');
    }
    function showTimeoutError() {
      const el = document.getElementById('error-msg');
      el.innerHTML = 'Forespørselen tok for lang tid. <button onclick="fetchReport()" style="background:none;border:1px solid var(--green);color:var(--green);font-family:\'DM Sans\',sans-serif;font-size:11px;letter-spacing:0.04em;cursor:pointer;padding:4px 10px;border-radius:3px;margin-left:8px;">PRØV IGJEN</button>';
      el.classList.add('visible');
    }
    function clearError() {
      document.getElementById('error-msg').classList.remove('visible');
    }

    // ── Render report ────────────────────────────────────────
    function renderData(data) {
      if (!data || !Array.isArray(data.categories) || !data.categories.length) {
        console.warn('[market] renderData: ugyldig eller ufullstendig data-struktur');
        return;
      }
      lastClaudeKeydata = data.keydata || [];

      const col = scoreColor(data.score ?? 50);
      const vc  = document.getElementById('verdict-card');
      vc.style.borderLeftColor = col;
      document.getElementById('verdict-text').textContent = data.verdict || '—';
      const scoreEl = document.getElementById('verdict-score');
      scoreEl.style.color = col;
      scoreEl.textContent = data.score ?? '—';

      // Populate keydata with Claude data first, then overwrite with real prices
      const keydataEl = document.getElementById('keydata');
      keydataEl.innerHTML = (data.keydata || []).map(kd => `
        <div class="chip">
          <div class="chip-label">${esc(kd.label)}</div>
          <div class="chip-value">${esc(kd.value)}</div>
        </div>`).join('');
      fetchAndInjectRealPrices(); // overwrite with real data

      const grid = document.getElementById('cat-grid');
      grid.innerHTML = (data.categories || []).map(cat => {
        const color = SENTIMENT_COLORS[cat.sentiment] || '#444';
        return `
          <div class="cat-card" style="border-color:${color}40;background:${color}08;">
            <div class="cat-header">
              <div class="cat-name">${esc(cat.name)}</div>
              <div class="badge" style="color: ${color}; background: ${color}18;">
                ${esc((cat.sentiment || '').toUpperCase())}
              </div>
            </div>
            <div class="cat-summary">${esc(cat.summary)}</div>
          </div>`;
      }).join('');

      // Show regime from cached VIX if available
      if (typeof data.vix === 'number') updateRegime(data.vix);

      document.getElementById('empty-state').style.display = 'none';
      const ds = document.getElementById('data-sections');
      ds.classList.add('visible');
      animateItems();

      fetchEarnings();
      renderMacroCalendar();
      fetchGappers();
    }

    let fetching = false;

    async function fetchReport() {
      if (fetching) return;
      fetching = true;
      clearError();

      const btn  = document.getElementById('fetch-btn');
      const rbtn = document.getElementById('refresh-btn');
      if (btn)  btn.disabled  = true;
      if (rbtn) { rbtn.disabled = true; rbtn.textContent = 'HENTER...'; }

      startLoading();

      const ctrl = new AbortController();
      const abortTimer = setTimeout(() => ctrl.abort(), 30000);

      try {
        const res = await fetch('/api/sentiment', { method: 'POST', signal: ctrl.signal });
        clearTimeout(abortTimer);
        if (res.status === 429) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.error || 'For mange forespørsler. Prøv igjen litt senere.');
        }
        if (!res.ok) throw new Error('Analysefeil. Prøv igjen.');
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        data.generatedAt = Date.now();
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
        stopLoading();
        renderData(data);
      } catch (e) {
        clearTimeout(abortTimer);
        stopLoading();
        document.getElementById('empty-state').style.display = '';
        if (e.name === 'AbortError') {
          showTimeoutError();
        } else {
          showError(e.message || 'Ukjent feil. Prøv igjen.');
        }
      } finally {
        fetching = false;
        if (btn)  btn.disabled  = false;
        if (rbtn) { rbtn.disabled = false; rbtn.textContent = 'HENT NY RAPPORT'; }
      }
    }

    function clearAndRefetch() {
      localStorage.removeItem(CACHE_KEY);
      fetchReport();
    }

    // Set date label
    document.getElementById('page-date').textContent = new Date()
      .toLocaleDateString('no-NO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
      .toUpperCase();

    // Auto-fetch only on weekdays 08:00–22:00 Oslo time
    function isMarketHours() {
      const oslo = new Date().toLocaleString('en-US', { timeZone: 'Europe/Oslo' });
      const d = new Date(oslo);
      const day = d.getDay(); // 0=Sun, 6=Sat
      const hour = d.getHours();
      return day >= 1 && day <= 5 && hour >= 8 && hour < 22;
    }

    // Load from cache on init; auto-fetch only during market hours
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cached) renderData(cached);
      else if (isMarketHours()) fetchReport();
      else fetchAndInjectRealPrices();
    } catch (e) {
      if (isMarketHours()) fetchReport();
      else fetchAndInjectRealPrices();
    }

    // ── Regime indicator ─────────────────────────────────────
    function updateRegime(vix) {
      const banner = document.getElementById('regime-banner');
      const valEl  = document.getElementById('regime-value');
      const vixEl  = document.getElementById('regime-vix');
      if (!banner) return;

      let label, color;
      if (vix < 15)       { label = 'BULL';  color = '#1D9E75'; }
      else if (vix <= 25) { label = 'RANGE'; color = '#BA7517'; }
      else                { label = 'BEAR';  color = '#E24B4A'; }

      banner.style.borderLeftColor = color;
      valEl.style.color = color;
      valEl.textContent = label;
      vixEl.textContent = 'VIX ' + vix.toFixed(2);
      banner.style.display = 'flex';
    }

    // ── Macro calendar ────────────────────────────────────────
    const MACRO_EVENTS = [
      { name: 'FOMC-møte',           date: '2026-04-29', type: 'FOMC' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-04-30', type: 'PCE' },
      { name: 'NFP (sysselsetting)',  date: '2026-05-01', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-05-12', type: 'CPI' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-05-29', type: 'PCE' },
      { name: 'NFP (sysselsetting)',  date: '2026-06-05', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-06-10', type: 'CPI' },
      { name: 'FOMC-møte',           date: '2026-06-17', type: 'FOMC' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-06-26', type: 'PCE' },
      { name: 'NFP (sysselsetting)',  date: '2026-07-10', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-07-14', type: 'CPI' },
      { name: 'FOMC-møte',           date: '2026-07-29', type: 'FOMC' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-07-31', type: 'PCE' },
      { name: 'NFP (sysselsetting)',  date: '2026-08-07', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-08-12', type: 'CPI' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-08-28', type: 'PCE' },
      { name: 'NFP (sysselsetting)',  date: '2026-09-04', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-09-09', type: 'CPI' },
      { name: 'FOMC-møte',           date: '2026-09-16', type: 'FOMC' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-09-25', type: 'PCE' },
      { name: 'NFP (sysselsetting)',  date: '2026-10-02', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-10-13', type: 'CPI' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-10-30', type: 'PCE' },
      { name: 'FOMC-møte',           date: '2026-11-04', type: 'FOMC' },
      { name: 'NFP (sysselsetting)',  date: '2026-11-06', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-11-10', type: 'CPI' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-11-25', type: 'PCE' },
      { name: 'NFP (sysselsetting)',  date: '2026-12-04', type: 'NFP' },
      { name: 'CPI (inflasjon)',      date: '2026-12-09', type: 'CPI' },
      { name: 'FOMC-møte',           date: '2026-12-16', type: 'FOMC' },
      { name: 'PCE (kjerneinflasjon)', date: '2026-12-23', type: 'PCE' },
    ];

    function renderMacroCalendar() {
      const section = document.getElementById('macro-section');
      if (!section) return;
      const todayDate = new Date(TODAY + 'T00:00:00');

      const upcoming = MACRO_EVENTS
        .map(e => {
          const d = Math.round((new Date(e.date + 'T00:00:00') - todayDate) / 86400000);
          return { ...e, daysUntil: d };
        })
        .filter(e => e.daysUntil >= 0)
        .sort((a, b) => a.daysUntil - b.daysUntil)
        .slice(0, 4);

      if (!upcoming.length) return;

      const rows = upcoming.map(e => {
        const dateStr = new Date(e.date + 'T12:00:00')
          .toLocaleDateString('no-NO', { day: 'numeric', month: 'short' }).toUpperCase();
        let badgeHtml;
        if (e.daysUntil === 0)      badgeHtml = `<div class="macro-badge today">I DAG</div>`;
        else if (e.daysUntil <= 3)  badgeHtml = `<div class="macro-badge soon">OM ${e.daysUntil}D</div>`;
        else                        badgeHtml = `<div class="macro-badge future">OM ${e.daysUntil}D</div>`;

        return `<div class="macro-row">
          <div class="macro-name">${esc(e.name)}</div>
          <div class="macro-date">${dateStr}</div>
          ${badgeHtml}
        </div>`;
      }).join('');

      section.innerHTML = `<div class="section-title">MAKROKALENDER</div>${rows}`;
      section.style.display = 'flex';
    }

    // ── Gappers ───────────────────────────────────────────────
    const GAPPERS_KEY = () => 'pulse_gappers_' + Math.floor(Date.now() / (15 * 60 * 1000));

    function isGappersWindow() {
      const etStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
      const et = new Date(etStr);
      const mins = et.getHours() * 60 + et.getMinutes();
      const day  = et.getDay();
      if (day === 0 || day === 6) return false;
      return mins < 630; // before 10:30 ET
    }

    function renderGappers(rows) {
      const wrap = document.getElementById('gappers-wrap');
      const section = document.getElementById('gappers-section');
      if (!wrap || !section) return;

      if (!isGappersWindow()) {
        section.innerHTML = '<div class="gappers-closed">Markedet er åpent — gap-data ikke relevant</div>';
        wrap.style.display = 'block';
        return;
      }

      if (!rows || rows.length === 0) return;

      const titleHtml = '<div class="section-title">PRE-MARKET GAPPERS</div>';
      const rowsHtml = rows.map(r => {
        const up   = r.gap >= 0;
        const sign = up ? '+' : '';
        const cls  = up ? 'up' : 'dn';
        const smaBadge = r.above200sma === true
          ? '<div class="gapper-sma above">200SMA ↑</div>'
          : r.above200sma === false
            ? '<div class="gapper-sma below">200SMA ↓</div>'
            : '';
        return `<div class="gapper-row">
          <div class="gapper-ticker ${cls}">${esc(r.ticker)}</div>
          <div class="gapper-company">${esc(r.company)}</div>
          <div class="gapper-gap ${cls}">${sign}${parseFloat(r.gap).toFixed(1)}%</div>
          ${smaBadge}
          <div class="gapper-vol">${esc(r.volume || '')}</div>
        </div>`;
      }).join('');

      section.innerHTML = titleHtml + rowsHtml;
      wrap.style.display = 'block';
    }

    async function fetchGappers() {
      if (!isGappersWindow()) {
        renderGappers(null);
        return;
      }
      const key = GAPPERS_KEY();
      try {
        const cached = JSON.parse(localStorage.getItem(key) || 'null');
        if (cached) { renderGappers(cached); return; }
      } catch (_) {}
      try {
        const res = await fetch('/api/gappers');
        if (!res.ok) return;
        const data = await res.json();
        if (Array.isArray(data)) {
          localStorage.setItem(key, JSON.stringify(data));
          renderGappers(data);
        }
      } catch (_) {}
    }

    // ── Earnings calendar ─────────────────────────────────────
    const EARNINGS_KEY = 'pulse_earnings_' + TODAY;

    function getWatchlist() {
      try { return JSON.parse(localStorage.getItem('pulse_watchlist') || '[]'); } catch { return []; }
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString('no-NO', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
    }

    function isPast(iso) {
      if (!iso) return false;
      return new Date(iso + 'T23:59:59') < new Date();
    }

    function renderEarnings(rows) {
      const section = document.getElementById('earnings-section');
      const list    = document.getElementById('earnings-list');
      if (!rows || rows.length === 0) {
        list.innerHTML = '<div class="earnings-empty">Ingen relevante earnings denne uken</div>';
        section.style.display = 'flex';
        return;
      }
      list.innerHTML = rows.map(r => {
        const past = isPast(r.date);
        const timeKey = (r.time || '').toLowerCase();
        let badgeClass = 'post', badgeText = 'ETTER BØRS';
        if (past) { badgeClass = 'past'; badgeText = 'AVHOLDT'; }
        else if (timeKey.includes('før') || timeKey.includes('pre') || timeKey.includes('before')) {
          badgeClass = 'pre'; badgeText = 'FØR BØRS';
        }
        return `<div class="earnings-row">
          <div class="earnings-ticker">${esc(r.ticker)}</div>
          <div class="earnings-company">${esc(r.company)}</div>
          <div class="earnings-date">${fmtDate(r.date)}</div>
          <div class="earnings-badge ${badgeClass}">${badgeText}</div>
        </div>`;
      }).join('');
      section.style.display = 'flex';
    }

    async function fetchEarnings() {
      try {
        const cached = JSON.parse(localStorage.getItem(EARNINGS_KEY) || 'null');
        if (cached) { renderEarnings(cached); return; }
      } catch (e) {}
      const wl = getWatchlist();
      const qs = wl.length ? '?watchlist=' + encodeURIComponent(wl.join(',')) : '';
      try {
        const res = await fetch('/api/earnings' + qs);
        if (!res.ok) return;
        const data = await res.json();
        if (Array.isArray(data)) {
          localStorage.setItem(EARNINGS_KEY, JSON.stringify(data));
          renderEarnings(data);
        }
      } catch (e) {}
    }
  </script>
