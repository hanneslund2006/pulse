<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Ticker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface-2: #181818;
      --border: #242424;
      --border-accent: #2a2a2a;
      --green: #1D9E75;
      --red: #E24B4A;
      --amber: #BA7517;
      --purple: #7F77DD;
      --text-primary: #F0F0F0;
      --text-secondary: #888888;
      --text-muted: #444444;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 32px 20px 64px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim {
      opacity: 0;
      animation: fadeUp 0.45s ease forwards;
    }

    /* Back */
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.06em;
      margin-bottom: 36px;
      transition: color 180ms;
    }
    .back:hover { color: var(--text-secondary); }

    /* Page header */
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    /* Search */
    .search-wrap {
      margin-bottom: 14px;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      color: var(--text-primary);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      outline: none;
      transition: border-color 200ms, box-shadow 200ms;
    }

    .search-input::placeholder {
      color: var(--text-muted);
      font-size: 13px;
      text-transform: none;
      letter-spacing: 0.04em;
      font-family: 'DM Sans', sans-serif;
    }

    .search-input:focus {
      border-color: rgba(29, 158, 117, 0.4);
      box-shadow: 0 0 0 2px rgba(29, 158, 117, 0.3);
    }

    /* Pills */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 40px;
    }

    .pill {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 150ms, border-color 150ms, background 150ms;
      user-select: none;
    }

    .pill:hover {
      color: var(--green);
      border-color: rgba(29, 158, 117, 0.4);
      background: rgba(29, 158, 117, 0.06);
    }

    /* Multi-step loading */
    .load-wrap { display: none; padding: 40px 0 32px; }
    .load-wrap.visible { display: block; }
    .load-steps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .load-step {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted);
      transition: color 300ms;
    }
    .load-step.active { color: var(--green); }
    .load-step.done { opacity: 0.35; }
    .ls-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .load-bar-wrap { height: 1px; background: var(--border); overflow: hidden; margin-bottom: 10px; }
    .load-bar { height: 100%; background: var(--green); width: 0%; }
    .load-elapsed { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 0.12em; }

    /* Price bar */
    .price-bar { display: none; align-items: baseline; gap: 10px; margin: 6px 0 14px; flex-wrap: wrap; }
    .price-bar.visible { display: flex; }
    .price-bar-val {
      font-family: 'Space Mono', monospace;
      font-size: 26px; font-weight: 700; color: var(--text-primary);
    }
    .price-bar-chg { font-family: 'Space Mono', monospace; font-size: 13px; }
    .price-bar-chg.up { color: var(--green); }
    .price-bar-chg.dn { color: var(--red); }
    .price-bar-delay {
      font-family: 'Space Mono', monospace;
      font-size: 9px; color: var(--text-muted); letter-spacing: 0.08em;
    }

    /* Watchlist pill price */
    .wpill-price { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 0.04em; margin-left: 2px; }
    .wpill-price.up { color: var(--green); opacity: 0.8; }
    .wpill-price.dn { color: var(--red); opacity: 0.8; }

    /* Error */
    .error-msg {
      display: none;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--red);
      padding: 16px 20px;
      background: rgba(226, 75, 74, 0.06);
      border: 0.5px solid rgba(226, 75, 74, 0.2);
      border-radius: 8px;
      letter-spacing: 0.04em;
    }

    .error-msg.visible { display: block; }

    /* Result */
    .result-section {
      display: none;
    }

    .result-section.visible { display: block; }

    .result-header {
      margin-bottom: 20px;
    }

    .result-company {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
    }

    .result-ticker-badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--green);
      letter-spacing: 0.1em;
      margin-top: 5px;
    }

    /* Layer cards */
    .layer-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 10px;
      transition: transform 180ms ease;
    }

    .layer-card:last-child { margin-bottom: 0; }

    .layer-card:hover { transform: translateY(-2px); }

    .layer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .layer-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    .badge {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 3px 7px;
      border-radius: 3px;
    }

    .layer-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    /* ── Watchlist ── */
    .watchlist-section {
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .watchlist-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 26px;
      align-items: center;
    }

    .watchlist-empty {
      font-size: 12px;
      color: var(--text-muted);
    }

    .wpill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--green);
      border: 0.5px solid rgba(29,158,117,0.35);
      border-radius: 4px;
      padding: 5px 8px 5px 10px;
      cursor: pointer;
      letter-spacing: 0.06em;
      background: rgba(29,158,117,0.06);
      transition: background 150ms;
      user-select: none;
    }

    .wpill:hover { background: rgba(29,158,117,0.13); }

    .wpill-del {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      font-size: 10px;
      color: var(--text-muted);
      border-radius: 2px;
      transition: color 150ms;
      flex-shrink: 0;
    }

    .wpill-del:hover { color: var(--red); }

    /* ── Search row with + button ── */
    .search-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .search-row .search-input { flex: 1; }

    .add-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      width: 50px;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 180ms, color 180ms;
      line-height: 1;
    }

    .add-btn:hover:not(:disabled) {
      border-color: rgba(29,158,117,0.4);
      color: var(--green);
    }

    .add-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">

    <a href="index.html" class="back anim" style="animation-delay: 0ms;">← TILBAKE</a>

    <div class="page-title anim" style="animation-delay: 40ms;">TICKER</div>
    <div class="page-subtitle anim" style="animation-delay: 80ms;">Analyser en aksje på fem lag.</div>

    <!-- Watchlist -->
    <div class="watchlist-section anim" style="animation-delay: 110ms;">
      <div class="section-title">WATCHLIST</div>
      <div class="watchlist-pills" id="watchlist-pills"></div>
    </div>

    <div class="search-wrap anim" style="animation-delay: 120ms;">
      <div class="search-row">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Skriv inn ticker — eks. AAPL, NVDA, TSLA"
          maxlength="6"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          spellcheck="false"
        >
        <button id="add-btn" class="add-btn" onclick="addToWatchlist()" disabled title="Kjør analyse først">+</button>
      </div>
    </div>

    <div class="pills anim" id="pills" style="animation-delay: 160ms;"></div>

    <div class="load-wrap" id="load-wrap">
      <div class="load-steps" id="load-steps"></div>
      <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
      <div class="load-elapsed" id="load-elapsed">0s</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="result-section" id="result-section">
      <div class="result-header">
        <div class="result-company" id="result-company"></div>
        <div class="price-bar" id="price-bar"></div>
        <div class="result-ticker-badge" id="result-ticker-badge"></div>
      </div>
      <div id="layers-container"></div>
    </div>

  </div>

  <script>
    // ── Watchlist ──────────────────────────────────────────────
    const WL_KEY = 'pulse_watchlist';
    let lastFoundTicker = null;
    let quoteCache = {};

    if (!localStorage.getItem(WL_KEY)) {
      localStorage.setItem(WL_KEY, JSON.stringify(['BN', 'MSFT', 'NVDA', 'UBER', 'ASTS']));
    }

    function getWatchlist() {
      try { return JSON.parse(localStorage.getItem(WL_KEY) || '[]'); } catch { return []; }
    }
    function saveWatchlist(list) { localStorage.setItem(WL_KEY, JSON.stringify(list)); }

    function fmtPill(p) {
      if (p >= 1000) return p.toLocaleString('en-US', { maximumFractionDigits: 0 });
      return p.toFixed(2);
    }

    function renderWatchlist() {
      const list = getWatchlist();
      const el = document.getElementById('watchlist-pills');
      if (list.length === 0) {
        el.innerHTML = '<span class="watchlist-empty">Ingen tickers lagt til ennå</span>';
        return;
      }
      el.innerHTML = list.map(t => {
        const q = quoteCache[t];
        let priceHtml = '';
        if (q) {
          const up = q.changePercent > 0, dn = q.changePercent < 0;
          const cls = up ? 'up' : dn ? 'dn' : '';
          priceHtml = `<span class="wpill-price ${cls}">${fmtPill(q.price)}</span>`;
        }
        return `<div class="wpill" onclick="runSearch('${esc(t)}')">
          ${esc(t)}${priceHtml}
          <span class="wpill-del" onclick="event.stopPropagation();removeFromWatchlist('${esc(t)}')">✕</span>
        </div>`;
      }).join('');
    }

    async function loadWatchlistQuotes() {
      const wl = getWatchlist();
      if (!wl.length) return;
      try {
        const res = await fetch('/api/quotes?symbols=' + encodeURIComponent(wl.join(',')));
        if (!res.ok) return;
        const data = await res.json();
        (data || []).forEach(q => { quoteCache[q.symbol] = q; });
        renderWatchlist();
      } catch (_) {}
    }

    function addToWatchlist() {
      if (!lastFoundTicker) return;
      const list = getWatchlist();
      if (list.includes(lastFoundTicker)) return;
      if (list.length >= 10) { alert('Watchlist er full (maks 10 tickers).'); return; }
      list.push(lastFoundTicker);
      saveWatchlist(list);
      renderWatchlist();
      document.getElementById('add-btn').disabled = true;
    }

    function removeFromWatchlist(ticker) {
      saveWatchlist(getWatchlist().filter(t => t !== ticker));
      renderWatchlist();
      if (lastFoundTicker === ticker) document.getElementById('add-btn').disabled = false;
    }

    // ── Constants ──────────────────────────────────────────────
    const POPULAR = ['AAPL', 'NVDA', 'TSLA', 'MSFT', 'AMZN', 'META', 'CEG'];

    const SENTIMENT_COLORS  = { 'Bullish': '#1D9E75', 'Bearish': '#E24B4A', 'Nøytral': '#3A3A3A' };
    const BADGE_TEXT_COLORS = { 'Bullish': '#1D9E75', 'Bearish': '#E24B4A', 'Nøytral': '#555555' };
    const BADGE_BG          = { 'Bullish': 'rgba(29,158,117,0.1)', 'Bearish': 'rgba(226,75,74,0.1)', 'Nøytral': '#1e1e1e' };

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Multi-step loading ─────────────────────────────────────
    const LOAD_STEPS = ['SØKER NYHETER', 'SJEKKER EARNINGS', 'SJEKKER INSIDER', 'BEREGNER SENTIMENT'];
    const loadState  = { stepTimer: null, elapsedTimer: null, startTime: 0, stepIdx: 0 };

    function startLoading() {
      loadState.stepIdx   = 0;
      loadState.startTime = Date.now();

      const stepsEl   = document.getElementById('load-steps');
      const barEl     = document.getElementById('load-bar');
      const elapsedEl = document.getElementById('load-elapsed');

      stepsEl.innerHTML = LOAD_STEPS.map((s, i) =>
        `<div class="load-step${i === 0 ? ' active' : ''}" id="ls-${i}">
          <div class="ls-dot"></div>${s}
        </div>`
      ).join('');

      barEl.style.transition = 'none';
      barEl.style.width = '0%';
      elapsedEl.textContent = '0s';
      document.getElementById('load-wrap').classList.add('visible');

      requestAnimationFrame(() => {
        barEl.style.transition = 'width 22s linear';
        barEl.style.width = '88%';
      });

      loadState.stepTimer = setInterval(() => {
        const prev = document.getElementById('ls-' + loadState.stepIdx);
        if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
        loadState.stepIdx = Math.min(loadState.stepIdx + 1, LOAD_STEPS.length - 1);
        const cur = document.getElementById('ls-' + loadState.stepIdx);
        if (cur) cur.classList.add('active');
      }, 5000);

      loadState.elapsedTimer = setInterval(() => {
        elapsedEl.textContent = Math.floor((Date.now() - loadState.startTime) / 1000) + 's';
      }, 1000);
    }

    function stopLoading() {
      clearInterval(loadState.stepTimer);
      clearInterval(loadState.elapsedTimer);
      document.getElementById('load-wrap').classList.remove('visible');
    }

    // ── Price bar ──────────────────────────────────────────────
    async function fetchRealPrice(ticker) {
      const bar = document.getElementById('price-bar');
      if (!bar) return;
      bar.classList.remove('visible');
      try {
        let q = quoteCache[ticker];
        if (!q && window.PULSE_QUOTES) {
          q = (window.PULSE_QUOTES || []).find(x => x.symbol === ticker || x.displaySymbol === ticker);
        }
        if (!q) {
          const res = await fetch('/api/quotes?symbols=' + encodeURIComponent(ticker));
          if (!res.ok) throw new Error();
          const data = await res.json();
          q = (data || [])[0];
        }
        if (!q) return;

        const up = q.changePercent > 0, dn = q.changePercent < 0;
        const cls  = up ? 'up' : dn ? 'dn' : '';
        const sign = up ? '+' : '';
        const priceStr = q.price >= 1000
          ? q.price.toLocaleString('en-US', { maximumFractionDigits: 2 })
          : q.price.toFixed(2);

        bar.innerHTML = `<span class="price-bar-val">$${priceStr}</span>
          <span class="price-bar-chg ${cls}">${sign}${q.changePercent.toFixed(2)}%</span>
          <span class="price-bar-delay">15-MIN FORSINKET</span>`;
        bar.classList.add('visible');
      } catch (_) {}
    }

    // ── Render layers ──────────────────────────────────────────
    function animateLayers() {
      document.querySelectorAll('.layer-card').forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(16px)';
        card.style.transition = 'none';
        requestAnimationFrame(() => {
          setTimeout(() => {
            card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          }, i * 80);
        });
      });
    }

    function renderTicker(data) {
      document.getElementById('result-company').textContent = data.company || data.ticker;
      document.getElementById('result-ticker-badge').textContent = '● ' + data.ticker;

      const container = document.getElementById('layers-container');
      container.innerHTML = (data.layers || []).map(layer => {
        const borderColor = SENTIMENT_COLORS[layer.sentiment]  || '#3A3A3A';
        const badgeColor  = BADGE_TEXT_COLORS[layer.sentiment] || '#555';
        const badgeBg     = BADGE_BG[layer.sentiment]          || '#1e1e1e';
        return `<div class="layer-card" style="border-left-color: ${borderColor};">
          <div class="layer-header">
            <div class="layer-name">${esc(layer.name.toUpperCase())}</div>
            <div class="badge" style="color: ${badgeColor}; background: ${badgeBg};">
              ${esc(layer.sentiment.toUpperCase())}
            </div>
          </div>
          <div class="layer-summary">${esc(layer.summary)}</div>
        </div>`;
      }).join('');

      const header = document.getElementById('result-section').querySelector('.result-header');
      header.style.opacity = '0';
      header.style.transform = 'translateY(16px)';
      header.style.transition = 'none';
      requestAnimationFrame(() => {
        setTimeout(() => {
          header.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          header.style.opacity = '1';
          header.style.transform = 'translateY(0)';
        }, 0);
      });

      setResult(true);
      animateLayers();

      lastFoundTicker = data.ticker;
      const addBtn = document.getElementById('add-btn');
      const inList = getWatchlist().includes(data.ticker);
      addBtn.disabled = inList;
      addBtn.title = inList ? 'Allerede i watchlist' : 'Legg til i watchlist';

      fetchRealPrice(data.ticker);
    }

    // ── State helpers ──────────────────────────────────────────
    function setError(msg) {
      const el = document.getElementById('error-msg');
      if (msg) { el.textContent = msg; el.classList.add('visible'); }
      else el.classList.remove('visible');
    }

    function setResult(show) {
      document.getElementById('result-section').classList.toggle('visible', show);
    }

    // ── Search ─────────────────────────────────────────────────
    async function runSearch(ticker) {
      ticker = ticker.trim().toUpperCase();
      if (!ticker) return;

      input.value = ticker;
      setError(null);
      setResult(false);
      document.getElementById('price-bar').classList.remove('visible');
      startLoading();
      lastFoundTicker = null;
      document.getElementById('add-btn').disabled = true;

      try {
        const res = await fetch('/api/ticker', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticker })
        });
        if (!res.ok) throw new Error('Serverfeil ' + res.status);
        const data = await res.json();

        stopLoading();
        if (data.error) { setError(data.error); return; }
        if (!data.found) { setError(`Fant ikke ticker "${ticker}". Sjekk symbolet og prøv igjen.`); return; }

        renderTicker(data);
      } catch (e) {
        stopLoading();
        setError('Klarte ikke hente data. Sjekk tilkoblingen og prøv igjen.');
      }
    }

    // ── Init ───────────────────────────────────────────────────
    renderWatchlist();
    loadWatchlistQuotes();

    const pillsEl = document.getElementById('pills');
    pillsEl.innerHTML = POPULAR.map(t =>
      `<div class="pill" onclick="runSearch('${t}')">${t}</div>`
    ).join('');

    const input = document.getElementById('search-input');
    input.addEventListener('input', () => {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9.]/g, '');
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { const v = input.value.trim(); if (v) runSearch(v); }
    });
  </script>
<script src="bg.js"></script>
<script src="live.js"></script>
</body>
</html>
