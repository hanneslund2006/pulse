<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PULSE — Ticker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 32px 20px 64px; }
    .container { max-width: 560px; margin: 0 auto; }

    /* Search */
    .search-wrap { margin-bottom: 14px; }
    .search-input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 18px; font-family: 'Space Mono', monospace;
      font-size: 18px; color: var(--text-primary);
      letter-spacing: 0.08em; text-transform: uppercase;
      outline: none; transition: border-color 200ms, box-shadow 200ms;
    }
    .search-input::placeholder {
      color: var(--text-muted); font-size: 13px;
      text-transform: none; letter-spacing: 0.04em;
      font-family: 'DM Sans', sans-serif;
    }
    .search-input:focus {
      border-color: var(--green-border);
      box-shadow: 0 0 0 2px rgba(29,184,126,0.12);
    }

    /* Pills */
    .pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 40px; }
    .pill {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--text-muted); border: 1px solid var(--border);
      border-radius: 4px; padding: 5px 10px; cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 150ms, border-color 150ms, background 150ms;
      user-select: none;
    }
    .pill:hover {
      color: var(--green); border-color: var(--green-border);
      background: var(--green-dim);
    }

    /* Price bar */
    .price-bar { display: none; align-items: baseline; gap: 10px; margin: 6px 0 14px; flex-wrap: wrap; }
    .price-bar.visible { display: flex; }
    .price-bar-val { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; color: var(--text-data); }
    .price-bar-chg { font-family: 'Space Mono', monospace; font-size: 13px; }
    .price-bar-chg.up { color: var(--green); }
    .price-bar-chg.dn { color: var(--red); }
    .price-bar-delay { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 0.08em; }

    /* Watchlist pill */
    .wpill-price { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--text-muted); letter-spacing: 0.04em; margin-left: 2px; }
    .wpill-price.up { color: var(--green); opacity: 0.8; }
    .wpill-price.dn { color: var(--red); opacity: 0.8; }

    /* Result */
    .result-section { display: none; }
    .result-section.visible { display: block; }
    .result-header { margin-bottom: 20px; }
    .result-company { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 26px; }
    .result-ticker-badge {
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--green); letter-spacing: 0.1em; margin-top: 5px;
    }

    /* Layer cards */
    .layer-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--border); border-radius: 12px;
      padding: 20px 24px; margin-bottom: 10px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .layer-card:last-child { margin-bottom: 0; }
    .layer-card:hover { border-color: rgba(29,184,126,0.28); box-shadow: 0 0 0 1px rgba(29,184,126,0.08), 0 0 20px rgba(29,184,126,0.06); }
    .layer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .layer-name { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 11px; letter-spacing: 0.08em; }
    .layer-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }

    /* Watchlist */
    .watchlist-section { margin-bottom: 28px; }
    .watchlist-pills { display: flex; flex-wrap: wrap; gap: 8px; min-height: 26px; align-items: center; }
    .watchlist-empty { font-size: 12px; color: var(--text-muted); }
    .wpill {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace; font-size: 11px;
      color: var(--green); border: 1px solid var(--green-border);
      border-radius: 4px; padding: 5px 8px 5px 10px; cursor: pointer;
      letter-spacing: 0.06em; background: var(--green-dim);
      transition: background 150ms; user-select: none;
    }
    .wpill:hover { background: rgba(29,184,126,0.18); }
    .wpill-del { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; font-size: 10px; color: var(--text-muted); border-radius: 2px; transition: color 150ms; flex-shrink: 0; }
    .wpill-del:hover { color: var(--red); }
    .wpill-warn { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--amber); letter-spacing: 0.04em; margin-left: 2px; flex-shrink: 0; }
    .wpill-warn.urgent { color: var(--red); }

    /* Technical card */
    .technical-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--border); border-radius: 12px;
      padding: 20px 24px; margin-bottom: 10px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .technical-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .technical-title { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 11px; letter-spacing: 0.08em; }
    .tech-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .tech-cell { display: flex; flex-direction: column; gap: 4px; }
    .tech-label { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--text-muted); letter-spacing: 0.1em; }
    .tech-value { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text-data); }
    .tech-value.up { color: var(--green); }
    .tech-value.dn { color: var(--red); }
    .tech-sub { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 0.06em; }
    .tech-sub.up { color: var(--green); }
    .tech-sub.dn { color: var(--red); }

    /* R/R Calculator */
    .rr-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px; margin-top: 10px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .rr-title { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 11px; letter-spacing: 0.08em; margin-bottom: 14px; color: var(--text-muted); }
    .rr-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .rr-field { display: flex; flex-direction: column; gap: 5px; }
    .rr-label { font-family: 'Space Mono', monospace; font-size: 8px; color: var(--text-muted); letter-spacing: 0.1em; }
    .rr-input {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
      font-family: 'Space Mono', monospace; font-size: 13px;
      color: var(--text-primary); outline: none; width: 100%; box-sizing: border-box;
      transition: border-color 200ms;
    }
    .rr-input:focus { border-color: var(--green-border); }
    .rr-result { display: flex; gap: 16px; align-items: baseline; }
    .rr-ratio { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 22px; color: var(--text-data); }
    .rr-ratio.good { color: var(--green); }
    .rr-ratio.bad  { color: var(--red); }
    .rr-be { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-muted); }

    /* Search row + button */
    .search-row { display: flex; gap: 8px; align-items: stretch; }
    .search-row .search-input { flex: 1; }
    .add-btn {
      background: transparent; border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-muted);
      font-family: 'Space Mono', monospace; font-size: 20px;
      width: 50px; flex-shrink: 0; cursor: pointer;
      transition: border-color 180ms, color 180ms; line-height: 1;
    }
    .add-btn:hover:not(:disabled) { border-color: var(--green-border); color: var(--green); }
    .add-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">

    <a href="index.html" class="back anim" style="animation-delay: 0ms;">← TILBAKE</a>

    <div class="page-title anim" style="animation-delay: 40ms;">TICKER</div>
    <div class="page-subtitle anim" style="animation-delay: 80ms;">Analyser en aksje på fem lag.</div>

    <!-- Watchlist -->
    <div class="watchlist-section anim" style="animation-delay: 110ms;">
      <div class="section-title">WATCHLIST</div>
      <div class="watchlist-pills" id="watchlist-pills"></div>
    </div>

    <div class="search-wrap anim" style="animation-delay: 120ms;">
      <div class="search-row">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Skriv inn ticker — eks. AAPL, NVDA, TSLA"
          maxlength="6"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          spellcheck="false"
        >
        <button id="add-btn" class="add-btn" onclick="addToWatchlist()" disabled title="Kjør analyse først">+</button>
      </div>
    </div>

    <div class="pills anim" id="pills" style="animation-delay: 160ms;"></div>

    <div class="load-wrap" id="load-wrap">
      <div class="load-steps" id="load-steps"></div>
      <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
      <div class="load-elapsed" id="load-elapsed">0s</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="result-section" id="result-section">
      <div class="result-header">
        <div class="result-company" id="result-company"></div>
        <div class="price-bar" id="price-bar"></div>
        <div class="result-ticker-badge" id="result-ticker-badge"></div>
      </div>
      <div id="technical-card" style="display:none;"></div>
      <div id="layers-container"></div>
      <div class="rr-card" id="rr-calc" style="display:none;">
        <div class="rr-title">R/R KALKULATOR</div>
        <div class="rr-inputs">
          <div class="rr-field">
            <div class="rr-label">ENTRY $</div>
            <input class="rr-input" id="rr-entry" type="number" step="0.01" placeholder="0.00" oninput="calcRR()">
          </div>
          <div class="rr-field">
            <div class="rr-label">STOP LOSS $</div>
            <input class="rr-input" id="rr-stop" type="number" step="0.01" placeholder="0.00" oninput="calcRR()">
          </div>
          <div class="rr-field">
            <div class="rr-label">TARGET $</div>
            <input class="rr-input" id="rr-target" type="number" step="0.01" placeholder="0.00" oninput="calcRR()">
          </div>
        </div>
        <div class="rr-result">
          <div class="rr-ratio" id="rr-ratio">—</div>
          <div class="rr-be" id="rr-be"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── Watchlist ──────────────────────────────────────────────
    const WL_KEY = 'pulse_watchlist';
    let lastFoundTicker = null;
    let quoteCache = {};

    if (!localStorage.getItem(WL_KEY)) {
      localStorage.setItem(WL_KEY, JSON.stringify(['BN', 'MSFT', 'NVDA', 'UBER', 'ASTS']));
    }

    function getWatchlist() {
      try { return JSON.parse(localStorage.getItem(WL_KEY) || '[]'); } catch { return []; }
    }
    function saveWatchlist(list) { localStorage.setItem(WL_KEY, JSON.stringify(list)); }

    function fmtPill(p) {
      if (p >= 1000) return p.toLocaleString('en-US', { maximumFractionDigits: 0 });
      return p.toFixed(2);
    }

    function getEarningsWarning(ticker) {
      try {
        const today = new Date().toISOString().slice(0, 10);
        const cached = JSON.parse(localStorage.getItem('pulse_earnings_' + today) || 'null');
        if (!cached || !Array.isArray(cached)) return null;
        const entry = cached.find(e => e.ticker === ticker);
        if (!entry || !entry.date) return null;
        const daysUntil = Math.round(
          (new Date(entry.date + 'T12:00:00') - new Date()) / 86400000
        );
        if (daysUntil < 0) return null;
        if (daysUntil === 0) return { text: '⚠ ER I DAG', urgent: true };
        if (daysUntil <= 3) return { text: `⚠ ER om ${daysUntil}d`, urgent: false };
        return null;
      } catch { return null; }
    }

    function renderWatchlist() {
      const list = getWatchlist();
      const el = document.getElementById('watchlist-pills');
      if (list.length === 0) {
        el.innerHTML = '<span class="watchlist-empty">Ingen tickers lagt til ennå</span>';
        return;
      }
      el.innerHTML = list.map(t => {
        const q = quoteCache[t];
        let priceHtml = '';
        if (q) {
          const up = q.changePercent > 0, dn = q.changePercent < 0;
          const cls = up ? 'up' : dn ? 'dn' : '';
          priceHtml = `<span class="wpill-price ${cls}">${fmtPill(q.price)}</span>`;
        }
        const warn = getEarningsWarning(t);
        const warnHtml = warn
          ? `<span class="wpill-warn${warn.urgent ? ' urgent' : ''}">${warn.text}</span>`
          : '';
        return `<div class="wpill" onclick="runSearch('${esc(t)}')">
          ${esc(t)}${priceHtml}${warnHtml}
          <span class="wpill-del" onclick="event.stopPropagation();removeFromWatchlist('${esc(t)}')">✕</span>
        </div>`;
      }).join('');
    }

    async function loadWatchlistQuotes() {
      const wl = getWatchlist();
      if (!wl.length) return;
      try {
        const res = await fetch('/api/quotes?symbols=' + encodeURIComponent(wl.join(',')));
        if (!res.ok) return;
        const data = await res.json();
        (data || []).forEach(q => { quoteCache[q.symbol] = q; });
        renderWatchlist();
      } catch (_) {}
    }

    function addToWatchlist() {
      if (!lastFoundTicker) return;
      const list = getWatchlist();
      if (list.includes(lastFoundTicker)) return;
      if (list.length >= 10) { alert('Watchlist er full (maks 10 tickers).'); return; }
      list.push(lastFoundTicker);
      saveWatchlist(list);
      renderWatchlist();
      document.getElementById('add-btn').disabled = true;
    }

    function removeFromWatchlist(ticker) {
      saveWatchlist(getWatchlist().filter(t => t !== ticker));
      renderWatchlist();
      if (lastFoundTicker === ticker) document.getElementById('add-btn').disabled = false;
    }

    // ── Constants ──────────────────────────────────────────────
    const POPULAR = ['AAPL', 'NVDA', 'TSLA', 'MSFT', 'AMZN', 'META', 'CEG'];

    const SENTIMENT_COLORS  = { 'Bullish': '#1DB87E', 'Bearish': '#E54B4A', 'Nøytral': '#4A5166' };
    const BADGE_TEXT_COLORS = { 'Bullish': '#1DB87E', 'Bearish': '#E54B4A', 'Nøytral': '#4A5166' };
    const BADGE_BG          = { 'Bullish': 'rgba(29,184,126,0.10)', 'Bearish': 'rgba(229,75,74,0.10)', 'Nøytral': 'rgba(74,81,102,0.12)' };

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Multi-step loading ─────────────────────────────────────
    const LOAD_STEPS = ['SØKER NYHETER', 'SJEKKER EARNINGS', 'SJEKKER INSIDER', 'BEREGNER SENTIMENT'];
    const loadState  = { stepTimer: null, elapsedTimer: null, startTime: 0, stepIdx: 0 };

    function startLoading() {
      loadState.stepIdx   = 0;
      loadState.startTime = Date.now();

      const stepsEl   = document.getElementById('load-steps');
      const barEl     = document.getElementById('load-bar');
      const elapsedEl = document.getElementById('load-elapsed');

      stepsEl.innerHTML = LOAD_STEPS.map((s, i) =>
        `<div class="load-step${i === 0 ? ' active' : ''}" id="ls-${i}">
          <div class="ls-dot"></div>${s}
        </div>`
      ).join('');

      barEl.style.transition = 'none';
      barEl.style.width = '0%';
      elapsedEl.textContent = '0s';
      document.getElementById('load-wrap').classList.add('visible');

      requestAnimationFrame(() => {
        barEl.style.transition = 'width 22s linear';
        barEl.style.width = '88%';
      });

      loadState.stepTimer = setInterval(() => {
        const prev = document.getElementById('ls-' + loadState.stepIdx);
        if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
        loadState.stepIdx = Math.min(loadState.stepIdx + 1, LOAD_STEPS.length - 1);
        const cur = document.getElementById('ls-' + loadState.stepIdx);
        if (cur) cur.classList.add('active');
      }, 5000);

      loadState.elapsedTimer = setInterval(() => {
        elapsedEl.textContent = Math.floor((Date.now() - loadState.startTime) / 1000) + 's';
      }, 1000);
    }

    function stopLoading() {
      clearInterval(loadState.stepTimer);
      clearInterval(loadState.elapsedTimer);
      document.getElementById('load-wrap').classList.remove('visible');
    }

    // ── Price bar ──────────────────────────────────────────────
    async function fetchRealPrice(ticker) {
      const bar = document.getElementById('price-bar');
      if (!bar) return;
      bar.classList.remove('visible');
      try {
        let q = quoteCache[ticker];
        if (!q && window.PULSE_QUOTES) {
          q = (window.PULSE_QUOTES || []).find(x => x.symbol === ticker || x.displaySymbol === ticker);
        }
        if (!q) {
          const res = await fetch('/api/quotes?symbols=' + encodeURIComponent(ticker));
          if (!res.ok) throw new Error();
          const data = await res.json();
          q = (data || [])[0];
        }
        if (!q) return;

        const up = q.changePercent > 0, dn = q.changePercent < 0;
        const cls  = up ? 'up' : dn ? 'dn' : '';
        const sign = up ? '+' : '';
        const priceStr = q.price >= 1000
          ? q.price.toLocaleString('en-US', { maximumFractionDigits: 2 })
          : q.price.toFixed(2);

        bar.innerHTML = `<span class="price-bar-val">$${priceStr}</span>
          <span class="price-bar-chg ${cls}">${sign}${q.changePercent.toFixed(2)}%</span>
          <span class="price-bar-delay">15-MIN FORSINKET</span>`;
        bar.classList.add('visible');
      } catch (_) {}
    }

    // ── Render layers ──────────────────────────────────────────
    function animateLayers() {
      document.querySelectorAll('.layer-card').forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(16px)';
        card.style.transition = 'none';
        requestAnimationFrame(() => {
          setTimeout(() => {
            card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          }, i * 80);
        });
      });
    }

    function renderTicker(data) {
      document.getElementById('result-company').textContent = data.company || data.ticker;
      document.getElementById('result-ticker-badge').textContent = '● ' + data.ticker;

      const container = document.getElementById('layers-container');
      container.innerHTML = (data.layers || []).map(layer => {
        const borderColor = SENTIMENT_COLORS[layer.sentiment]  || '#3A3A3A';
        const badgeColor  = BADGE_TEXT_COLORS[layer.sentiment] || '#555';
        const badgeBg     = BADGE_BG[layer.sentiment]          || '#1e1e1e';
        return `<div class="layer-card" style="border-left-color: ${borderColor};">
          <div class="layer-header">
            <div class="layer-name">${esc(layer.name.toUpperCase())}</div>
            <div class="badge" style="color: ${badgeColor}; background: ${badgeBg};">
              ${esc(layer.sentiment.toUpperCase())}
            </div>
          </div>
          <div class="layer-summary">${esc(layer.summary)}</div>
        </div>`;
      }).join('');

      const header = document.getElementById('result-section').querySelector('.result-header');
      header.style.opacity = '0';
      header.style.transform = 'translateY(16px)';
      header.style.transition = 'none';
      requestAnimationFrame(() => {
        setTimeout(() => {
          header.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          header.style.opacity = '1';
          header.style.transform = 'translateY(0)';
        }, 0);
      });

      // Render technical card
      const techCard = document.getElementById('technical-card');
      if (data.technical && techCard) {
        const t = data.technical;
        const trendCol = t.trend === 'Bullish' ? 'var(--green)' : t.trend === 'Bearish' ? 'var(--red)' : 'var(--text-muted)';
        const trendBg  = t.trend === 'Bullish' ? 'rgba(29,184,126,0.10)' : t.trend === 'Bearish' ? 'rgba(229,75,74,0.10)' : 'rgba(74,81,102,0.12)';
        const smaDir   = t.above200sma ? 'up' : 'dn';
        const smaTxt   = t.above200sma ? '↑ OVER' : '↓ UNDER';
        const pvs      = (t.priceVsSma200pct >= 0 ? '+' : '') + t.priceVsSma200pct + '%';
        techCard.innerHTML = `<div class="technical-card" style="border-left-color: ${trendCol};">
          <div class="technical-header">
            <div class="technical-title">TEKNISK ANALYSE</div>
            <div class="badge" style="color: ${trendCol}; background: ${trendBg};">${esc(t.trend.toUpperCase())}</div>
          </div>
          <div class="tech-grid">
            <div class="tech-cell">
              <div class="tech-label">200 SMA</div>
              <div class="tech-value">$${t.sma200}</div>
              <div class="tech-sub ${smaDir}">${smaTxt} · ${pvs}</div>
            </div>
            <div class="tech-cell">
              <div class="tech-label">8 EMA</div>
              <div class="tech-value">$${t.ema8}</div>
            </div>
            <div class="tech-cell">
              <div class="tech-label">TREND</div>
              <div class="tech-value ${smaDir}">${esc(t.trend.toUpperCase())}</div>
            </div>
          </div>
        </div>`;
        techCard.style.display = 'block';
      } else if (techCard) {
        techCard.style.display = 'none';
      }

      // Show R/R calculator
      const rrCalc = document.getElementById('rr-calc');
      if (rrCalc) rrCalc.style.display = 'block';

      setResult(true);
      animateLayers();

      lastFoundTicker = data.ticker;
      const addBtn = document.getElementById('add-btn');
      const inList = getWatchlist().includes(data.ticker);
      addBtn.disabled = inList;
      addBtn.title = inList ? 'Allerede i watchlist' : 'Legg til i watchlist';

      fetchRealPrice(data.ticker);
    }

    // ── State helpers ──────────────────────────────────────────
    function setError(msg) {
      const el = document.getElementById('error-msg');
      if (msg) { el.textContent = msg; el.classList.add('visible'); }
      else el.classList.remove('visible');
    }

    function setResult(show) {
      document.getElementById('result-section').classList.toggle('visible', show);
    }

    // ── Search ─────────────────────────────────────────────────
    async function runSearch(ticker) {
      ticker = ticker.trim().toUpperCase();
      if (!ticker) return;

      input.value = ticker;
      setError(null);
      setResult(false);
      document.getElementById('price-bar').classList.remove('visible');
      startLoading();
      lastFoundTicker = null;
      document.getElementById('add-btn').disabled = true;

      try {
        const res = await fetch('/api/ticker', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticker })
        });
        if (!res.ok) throw new Error('Serverfeil ' + res.status);
        const data = await res.json();

        stopLoading();
        if (data.error) { setError(data.error); return; }
        if (!data.found) { setError(`Fant ikke ticker "${ticker}". Sjekk symbolet og prøv igjen.`); return; }

        renderTicker(data);
      } catch (e) {
        stopLoading();
        setError('Klarte ikke hente data. Sjekk tilkoblingen og prøv igjen.');
      }
    }

    // ── R/R Calculator ────────────────────────────────────
    function calcRR() {
      const entry  = parseFloat(document.getElementById('rr-entry').value);
      const stop   = parseFloat(document.getElementById('rr-stop').value);
      const target = parseFloat(document.getElementById('rr-target').value);
      const ratioEl = document.getElementById('rr-ratio');
      const beEl    = document.getElementById('rr-be');
      if (!ratioEl || !beEl) return;
      if (isNaN(entry) || isNaN(stop) || isNaN(target) || entry === stop) {
        ratioEl.textContent = '—';
        ratioEl.className = 'rr-ratio';
        beEl.textContent = '';
        return;
      }
      const risk   = Math.abs(entry - stop);
      const reward = Math.abs(target - entry);
      const ratio  = reward / risk;
      const be     = (risk / (risk + reward) * 100).toFixed(1);
      ratioEl.textContent = '1:' + ratio.toFixed(2);
      ratioEl.className = 'rr-ratio' + (ratio >= 2 ? ' good' : ' bad');
      beEl.textContent = 'Break-even ' + be + '%';
    }

    // ── Init ───────────────────────────────────────────────────
    renderWatchlist();
    loadWatchlistQuotes();

    const pillsEl = document.getElementById('pills');
    pillsEl.innerHTML = POPULAR.map(t =>
      `<div class="pill" onclick="runSearch('${t}')">${t}</div>`
    ).join('');

    const input = document.getElementById('search-input');
    input.addEventListener('input', () => {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9.]/g, '');
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { const v = input.value.trim(); if (v) runSearch(v); }
    });
  </script>

</body>
